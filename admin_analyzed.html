<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Center - Hospital</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script>
        // "Pancerny" skrypt weryfikacji sesji - opóźniony do załadowania DOM
        document.addEventListener('DOMContentLoaded', function() {
            let auth = localStorage.getItem('hospital_auth');
            if (auth) {
                try {
                    auth = JSON.parse(auth);
                    if (typeof auth === 'string') auth = JSON.parse(auth);
                } catch(e) {
                    console.error("Błąd parsowania sesji:", e);
                    window.location.href = 'portal.html';
                    return;
                }
            }

            // Sprawdzenie typu/roli (akceptujemy 'type' lub 'role' lub 'ranga')
            const isAdmin = auth.type === 'admin' || auth.role === 'admin' || auth.ranga === 'Administrator';

            if (isAdmin) {
                console.log("Witaj Adminie, dostęp przyznany!");
                // Auto-login: pokaż panel jeśli admin jest zalogowany
                document.getElementById("loginScreen").classList.add("hidden");
                document.getElementById("panel").classList.remove("hidden");
                renderAll();
            } else {
                console.log("Brak autoryzacji admina - przekierowanie do portalu");
                window.location.href = 'portal.html';
            }
        });
    </script>
    <style>
        :root {
            --bg: #070a10; --glass: rgba(255, 255, 255, 0.05); --line: rgba(255,255,255,.12);
            --text: #e8eef9; --muted: #95a4ba; --gold: #f1c40f; --doc: #33c7ff; --pat: #37ff94; --err: #ff5c73;
        }
        
        * { box-sizing: border-box; font-family: Consolas, "Courier New", monospace; }
        body { 
            margin: 0; 
            color: var(--text); 
            background: linear-gradient(135deg, #05070b, #0d1320);
            position: relative;
            min-height: 100vh;
        }
        
        .hidden { display: none !important; }
        .glass { 
            background: var(--glass); 
            backdrop-filter: blur(10px); 
            border: 1px solid var(--line); 
            border-radius: 12px; 
        }
        .btn, .btn-danger { 
            background: var(--doc); 
            color: var(--bg); 
            border: none; 
            padding: 8px 12px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 11px; 
            text-transform: uppercase;
            transition: all 0.2s;
        }
        .btn:hover, .btn-danger:hover { transform: translateY(-2px); box-shadow: 0 4px 12px var(--doc); }
        .btn-danger { background: var(--err); }
        .btn-danger:hover { box-shadow: 0 4px 12px var(--err); }
        .msg { 
            padding: 8px 12px; 
            border-radius: 6px; 
            margin: 8px 0; 
            font-size: 11px; 
            text-transform: uppercase;
        }
        .msg.ok { background: rgba(55, 255, 148, 0.1); color: var(--pat); border: 1px solid var(--pat); }
        .msg.err { background: rgba(255, 92, 115, 0.1); color: var(--err); border: 1px solid var(--err); }
        
        .card { 
            background: var(--glass); 
            border: 1px solid var(--line); 
            border-radius: 12px; 
            padding: 20px; 
            margin: 16px;
            backdrop-filter: blur(10px);
        }
        .card h2 { 
            color: #ffeb9e; 
            margin: 0 0 8px 0; 
            font-size: 16px; 
            text-transform: uppercase;
        }
        .card .sub { 
            color: var(--muted); 
            margin: 0 0 16px 0; 
            font-size: 11px; 
        }
        .row4 { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 8px; margin: 16px 0; }
        .row3 { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 8px; margin: 16px 0; }
        .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 16px 0; }
        
        input, select { 
            background: rgba(255,255,255,0.05); 
            border: 1px solid var(--line); 
            color: var(--text); 
            padding: 8px 12px; 
            border-radius: 6px; 
            font-size: 11px; 
        }
        input:focus, select:focus { 
            outline: none; 
            border-color: var(--doc); 
            box-shadow: 0 0 0 2px rgba(51, 199, 255, 0.2);
        }
        
        table { width: 100%; border-collapse: collapse; }
        th { 
            color: #ffeb9e; 
            font-size: 11px; 
            text-transform: uppercase; 
            padding: 8px; 
            text-align: left;
        }
        td { 
            padding: 8px; 
            color: var(--text); 
            border-bottom: 1px solid var(--line);
        }
        
        #loginScreen { 
            position: fixed; 
            top: 0; 
            left: 0; 
            right: 0; 
            bottom: 0; 
            background: var(--bg); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            z-index: 1000;
        }
        #panel { 
            max-width: 1400px; 
            margin: 0 auto; 
            padding: 20px; 
        }
        .login-box { 
            background: var(--glass); 
            border: 1px solid var(--line); 
            border-radius: 12px; 
            padding: 40px; 
            backdrop-filter: blur(10px);
            text-align: center;
        }
        .login-box h1 { 
            color: #ffeb9e; 
            margin: 0 0 20px 0; 
            font-size: 24px; 
        }
        .login-box input { 
            width: 100%; 
            margin: 8px 0; 
        }
    </style>
</head>
<body>
    <div id="loginScreen" class="hidden">
        <div class="login-box">
            <h1>🏥 ADMIN CENTER</h1>
            <input type="password" id="adminPass" placeholder="Kod Admina" />
            <button class="btn" onclick="adminLogin()">AUTORYZUJ</button>
            <div id="loginMsg" class="msg"></div>
        </div>
    </div>

    <div id="panel" class="hidden">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
            <div class="card">
                <h2>Generator Kodów Dostępu</h2>
                <div class="sub">Generowanie jednorazowych tokenów dostępu.</div>
                <div class="row4">
                    <select id="genType"><option value="doctor">Lekarz</option><option value="patient">Pacjent</option></select>
                    <input id="genCount" type="number" min="1" max="20" value="1" />
                    <input id="genPrefix" type="text" placeholder="Prefix (opcj.)" />
                    <button class="btn" onclick="generateCodes()">GENERUJ</button>
                </div>
                <div class="row4" style="margin-top: 8px;">
                    <button class="btn-danger" onclick="clearAllCodes()">WYCZYŚĆ WSZYSTKIE KODY</button>
                </div>
                <div id="genMsg" class="msg"></div>
                <div id="pendingTable" style="margin-top: 16px;"></div>
            </div>
            
            <div class="card">
                <h2>Zarządzanie Grafikiem</h2>
                <div class="sub">Przypisywanie dyżurów lekarzom.</div>
                <div class="row3">
                    <select id="schedule_doctor"><option value="">Wybierz lekarza...</option></select>
                    <input id="schedule_date" type="datetime-local" />
                    <button class="btn" onclick="addSchedule()">DODAJ DYŻUR</button>
                </div>
                <div id="scheduleMsg" class="msg"></div>
                <div id="scheduleTable" style="margin-top: 16px;"></div>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
            <div class="card">
                <h2>Baza Lekarzy</h2>
                <div class="sub">Zmiana rangi/specjalizacji i usuwanie kont.</div>
                <table id="doctorsTable" style="margin-top: 16px;"></table>
            </div>
            
            <div class="card">
                <h2>Baza Cywili (Pacjentów)</h2>
                <div class="sub">Usunięcie konta czyści też wpis w `hosp_v545`.</div>
                <table id="patientsTable" style="margin-top: 16px;"></table>
            </div>
        </div>
    </div>

    <script>
        const BOSS = "BOSS123";

        function uid(prefix) {
            return (prefix || "ID") + "-" + Math.random().toString(36).substr(2, 9).toUpperCase();
        }

        function esc(txt) {
            if (!txt) return "";
            return String(txt).replace(/[&<>"']/g, function(m) { 
                return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]; 
            });
        }

        function readLS(key, def) {
            try {
                const v = localStorage.getItem(key);
                return v ? JSON.parse(v) : def;
            } catch(e) { 
                return def; 
            }
        }

        function writeLS(key, val) {
            localStorage.setItem(key, JSON.stringify(val));
        }

        function adminLogin() {
            const pass = document.getElementById("adminPass").value.trim().toUpperCase();
            const msg = document.getElementById("loginMsg");
            
            if (pass === BOSS) {
                const userData = {
                    type: 'admin',
                    name: 'Administrator',
                    loginTime: Date.now()
                };
                localStorage.setItem('hospital_auth', JSON.stringify(userData));
                msg.className = "msg ok";
                msg.textContent = "Autoryzacja OK. Przekierowanie...";
                setTimeout(() => {
                    document.getElementById("loginScreen").classList.add("hidden");
                    document.getElementById("panel").classList.remove("hidden");
                    renderAll();
                }, 500);
            } else {
                msg.className = "msg err";
                msg.textContent = "Błędny kod dostępu.";
            }
        }

        function logout() {
            localStorage.removeItem('hospital_auth');
            window.location.href = "portal.html";
        }

        function createSecureCode(type, rank) {
            try {
                console.log("createSecureCode called with type:", type, "rank:", rank);
                const accessKeys = JSON.parse(localStorage.getItem('hospital_access_keys') || '[]');
                console.log("Current accessKeys before adding:", accessKeys);
                
                const newCode = {
                    id: Date.now(),
                    code: Math.random().toString(36).substr(2, 6).toUpperCase(),
                    type: type,
                    assignedRank: rank,
                    createdAt: new Date().toISOString()
                };
                
                accessKeys.push(newCode);
                localStorage.setItem('hospital_access_keys', JSON.stringify(accessKeys));
                console.log("Kody w bazie po dodaniu:", localStorage.getItem('hospital_access_keys'));
                console.log("New code created:", newCode);
                return newCode;
            } catch(error) {
                console.error("Error in createSecureCode:", error);
                throw error;
            }
        }

        function generateCodes() {
            console.log("generateCodes() called");
            try {
                const type = document.getElementById("genType").value;
                const count = Math.max(1, Math.min(20, Number(document.getElementById("genCount").value || 1)));
                const created = [];
                
                console.log("Generating", count, "codes of type:", type);
                console.log("Current hospital_access_keys:", localStorage.getItem('hospital_access_keys'));
                
                for (let i = 0; i < count; i += 1) {
                    const newCode = createSecureCode(type, type === "doctor" ? "Lekarz" : "Pacjent");
                    created.push(newCode.code);
                    console.log("Generated code:", newCode.code);
                }
                
                const msg = document.getElementById("genMsg");
                msg.className = "msg ok";
                msg.textContent = "Wygenerowano: " + created.join(", ");
                renderPending();
                console.log("Codes generated and rendered");
                console.log("Final hospital_access_keys:", localStorage.getItem('hospital_access_keys'));
            } catch(error) {
                console.error("Error in generateCodes:", error);
                const msg = document.getElementById("genMsg");
                msg.className = "msg err";
                msg.textContent = "Błąd generowania kodów: " + error.message;
            }
        }

        function clearAllCodes() {
            if (!confirm("Czy na pewno wyczyścić WSZYSTKIE kody dostępu?")) return;
            localStorage.setItem('hospital_access_keys', JSON.stringify([]));
            localStorage.setItem('pending_codes', JSON.stringify([]));
            renderPending();
            document.getElementById("genMsg").className = "msg ok";
            document.getElementById("genMsg").textContent = "Wszystkie kody zostały wyczyszczone.";
            console.log("Kody w bazie po wyczyszczeniu:", localStorage.getItem('hospital_access_keys'));
        }

        function renderPending() {
            const accessKeys = JSON.parse(localStorage.getItem('hospital_access_keys') || '[]');
            const table = document.getElementById("pendingTable");
            console.log("renderPending() called, accessKeys:", accessKeys);
            console.log("table element:", table);
            
            table.innerHTML = accessKeys.length ? `
                <table style="width: 100%; border-collapse: collapse;">
                    <thead><tr><th style="color: #ffeb9e; font-size: 11px; text-transform: uppercase; padding: 8px;">Kod</th><th style="color: #ffeb9e; font-size: 11px; text-transform: uppercase; padding: 8px;">Typ</th><th style="color: #ffeb9e; font-size: 11px; text-transform: uppercase; padding: 8px;">Ranga</th><th style="color: #ffeb9e; font-size: 11px; text-transform: uppercase; padding: 8px;">Data utworzenia</th><th style="color: #ffeb9e; font-size: 11px; text-transform: uppercase; padding: 8px;">Akcja</th></tr></thead>
                    <tbody>
                        ${accessKeys.map(c => `
                            <tr style="border-bottom: 1px solid var(--line);">
                                <td style="padding: 8px;">${esc(c.code)}</td>
                                <td style="padding: 8px;">${esc(c.type)}</td>
                                <td style="padding: 8px;">${esc(c.assignedRank)}</td>
                                <td style="padding: 8px;">${new Date(c.createdAt).toLocaleString('pl-PL')}</td>
                                <td style="padding: 8px;"><button class="btn-danger" onclick="removeAccessKey('${esc(c.id)}')" style="font-size: 10px; padding: 4px 8px;">USUŃ</button></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            ` : '<div style="color: var(--muted); text-align: center; padding: 20px;">Brak aktywnych kodów.</div>';
            
            console.log("renderPending() completed");
        }

        function removeAccessKey(keyId) {
            if (!confirm("Usunąć ten kod?")) return;
            const accessKeys = JSON.parse(localStorage.getItem('hospital_access_keys') || '[]');
            const filteredKeys = accessKeys.filter(k => k.id !== keyId);
            localStorage.setItem('hospital_access_keys', JSON.stringify(filteredKeys));
            console.log("Kody w bazie po usunięciu:", localStorage.getItem('hospital_access_keys'));
            renderPending();
        }

        function renderDoctors() {
            const docs = readLS("hospital_staff", []);
            const ranks = ["Student Medycyny", "Młodszy Ratownik", "Ratownik Medyczny", "Lekarz Rezydent", "Lekarz Specjalista", "Zastępca Ordynatora", "Ordynator", "Zarząd Szpitala", "Dyrektor Szpitala"];
            const table = document.getElementById("doctorsTable");
            table.innerHTML = `<thead><tr><th>Kod</th><th>Imię i nazwisko</th><th>Ranga</th><th>Specjalizacja</th><th>Akcja</th></tr></thead><tbody>${docs.length ? docs.map(d => `
                <tr>
                    <td>${esc(d.code)}</td>
                    <td>${esc(d.name)}</td>
                    <td>
                        <select id="rank_${esc(d.id)}" onchange="updateDoctorRank('${esc(d.id)}', this.value)">
                            ${ranks.map(r => '<option value="' + esc(r) + '"' + (d.rank === r ? ' selected' : '') + '>' + esc(r) + '</option>').join('')}
                        </select>
                    </td>
                    <td>
                        <input type="text" value="' + esc(d.specialization || '') + '" onchange="updateDoctorSpecialization('${esc(d.id)}', this.value)" placeholder="Specjalizacja" />
                    </td>
                    <td>
                        <button class="btn" onclick="editDoctorRank('${esc(d.id)}')">EDYTUJ RANGĘ</button>
                        <button class="btn-danger" onclick="deleteDoctor('${esc(d.id)}')">USUŃ</button>
                    </td>
                </tr>
            `).join("") : `<tr><td colspan="5">Brak lekarzy.</td></tr>`}</tbody>`;

            // Załaduj lekarzy do selecta harmonogramu
            const scheduleSelect = document.getElementById("schedule_doctor");
            if (scheduleSelect) {
                scheduleSelect.innerHTML = "<option value=''>Wybierz lekarza...</option>";
                docs.forEach(doctor => {
                    scheduleSelect.innerHTML += `<option value='${doctor.id}'>${doctor.name} - ${doctor.specialization}</option>`;
                });
            }
        }

        function updateDoctorRank(doctorId, newRank) {
            const docs = readLS("hospital_staff", []);
            const doctor = docs.find(d => d.id === doctorId);
            if (doctor) {
                doctor.rank = newRank;
                writeLS("hospital_staff", docs);
                document.getElementById("genMsg").className = "msg ok";
                document.getElementById("genMsg").textContent = "Ranga została zaktualizowana.";
            }
        }

        function updateDoctorSpecialization(doctorId, newSpecialization) {
            const docs = readLS("hospital_staff", []);
            const doctor = docs.find(d => d.id === doctorId);
            if (doctor) {
                doctor.specialization = newSpecialization;
                writeLS("hospital_staff", docs);
                document.getElementById("genMsg").className = "msg ok";
                document.getElementById("genMsg").textContent = "Specjalizacja została zaktualizowana.";
            }
        }

        function editDoctorRank(doctorId) {
            const docs = readLS("hospital_staff", []);
            const doctor = docs.find(d => d.id === doctorId);
            if (doctor) {
                const newRank = prompt("Podaj nową rangę:", doctor.rank);
                if (newRank && newRank !== doctor.rank) {
                    doctor.rank = newRank;
                    writeLS("hospital_staff", docs);
                    renderDoctors();
                    document.getElementById("genMsg").className = "msg ok";
                    document.getElementById("genMsg").textContent = "Ranga została zaktualizowana.";
                }
            }
        }

        function deleteDoctor(id) {
            if (!confirm("Usunąć konto lekarza?")) return;
            writeLS("hospital_staff", readLS("hospital_staff", []).filter(d => d.id !== id));
            renderDoctors();
        }

        function renderPatients() {
            const pats = readLS("hosp_v545", []);
            const table = document.getElementById("patientsTable");
            table.innerHTML = '<thead><tr><th>SSN</th><th>Imię i nazwisko</th><th>Ubezpieczyciel</th><th>Status</th><th>Akcja</th></tr></thead><tbody>' + (pats.length ? pats.map(p => `
                <tr>
                    <td>${esc(p.ssn || '-')}</td>
                    <td>${esc(p.name)}</td>
                    <td>${esc(p.insurance || '-')}</td>
                    <td>${esc(p.status || 'Aktywny')}</td>
                    <td>
                        <button class="btn" onclick="editPatientData('${esc(p.id)}')">EDYTUJ DANE</button>
                        <button class="btn-danger" onclick="removePatient('${esc(p.id)}')">USUŃ</button>
                    </td>
                </tr>
            `).join("") : '<tr><td colspan="5">Brak pacjentów.</td></tr>') + '</tbody>';
        }

        function editPatientData(patientId) {
            const pats = readLS("hosp_v545", []);
            const patient = pats.find(p => p.id === patientId);
            if (patient) {
                const newInsurance = prompt("Nowe ubezpieczenie:", patient.insurance || '');
                const newNote = prompt("Nowa notatka (do historii):", '');

                if (newInsurance !== null) {
                    patient.insurance = newInsurance;
                }

                if (newNote !== null && newNote.trim()) {
                    if (!patient.history) patient.history = [];
                    patient.history.push({
                        id: Date.now(),
                        note: newNote,
                        timestamp: new Date().toISOString(),
                        type: 'admin_note'
                    });
                }

                writeLS("hosp_v545", pats);
                renderPatients();
                document.getElementById("genMsg").className = "msg ok";
                document.getElementById("genMsg").textContent = "Dane pacjenta zostały zaktualizowane.";
            }
        }

        function removePatient(id) {
            if (!confirm("Usunąć tego pacjenta?")) return;
            const allPatients = readLS("hosp_v545", []);
            const filteredPatients = allPatients.filter(p => p.id !== id);
            writeLS("hosp_v545", filteredPatients);
            renderPatients();
        }

        function addSchedule() {
            const doctorId = document.getElementById("schedule_doctor").value;
            const date = document.getElementById("schedule_date").value;
            const msg = document.getElementById("scheduleMsg");
            
            if (!doctorId) {
                msg.className = "msg err";
                msg.textContent = "Wybierz lekarza.";
                return;
            }
            
            if (!date) {
                msg.className = "msg err";
                msg.textContent = "Wybierz datę dyżuru.";
                return;
            }
            
            const docs = readLS("hospital_staff", []);
            const doctor = docs.find(d => d.id === doctorId);
            if (!doctor) {
                msg.className = "msg err";
                msg.textContent = "Nie znaleziono lekarza.";
                return;
            }
            
            const schedule = readLS("hospital_schedule", []);
            const newShift = {
                id: uid("SHIFT"),
                doctorId: doctorId,
                doctorName: doctor.name,
                rank: doctor.rank,
                date: new Date(date).getTime(),
                dateStr: new Date(date).toLocaleString('pl-PL'),
                createdAt: Date.now()
            };
            
            schedule.push(newShift);
            writeLS("hospital_schedule", schedule);
            
            msg.className = "msg ok";
            msg.textContent = `Dyżur dodany: ${doctor.name} - ${new Date(date).toLocaleString('pl-PL')}`;
            
            document.getElementById("schedule_doctor").value = "";
            document.getElementById("schedule_date").value = "";
            renderSchedule();
        }

        function removeSchedule(id) {
            if (!confirm("Usunąć ten dyżur?")) return;
            const schedule = readLS("hospital_schedule", []).filter(s => s.id !== id);
            writeLS("hospital_schedule", schedule);
            renderSchedule();
        }

        function renderSchedule() {
            const schedule = readLS("hospital_schedule", []);
            const table = document.getElementById("scheduleTable");
            if (!table) return;
            
            table.innerHTML = schedule.length ? `
                <table style="width: 100%; border-collapse: collapse;">
                    <thead><tr><th style="color: #ffeb9e; font-size: 11px; text-transform: uppercase; padding: 8px;">Lekarz</th><th style="color: #ffeb9e; font-size: 11px; text-transform: uppercase; padding: 8px;">Ranga</th><th style="color: #ffeb9e; font-size: 11px; text-transform: uppercase; padding: 8px;">Data dyżuru</th><th style="color: #ffeb9e; font-size: 11px; text-transform: uppercase; padding: 8px;">Akcja</th></tr></thead>
                    <tbody>
                        ${schedule.map(shift => {
                            const rankColor = shift.rank === 'Ordynator' || shift.rank === 'Dyrektor Szpitala' || shift.rank === 'Zarząd Szpitala' ? '#f1c40f' : '#39a8ff';
                            const dateStr = new Date(shift.date).toLocaleString('pl-PL');
                            return '<tr style="border-bottom: 1px solid var(--line);"><td style="padding: 8px; color: var(--text);">' + esc(shift.doctorName) + '</td><td style="padding: 8px;"><span style="background: ' + rankColor + '20; color: ' + rankColor + '; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold;">' + esc(shift.rank) + '</span></td><td style="padding: 8px; color: var(--text);">' + dateStr + '</td><td style="padding: 8px;"><button class="btn-danger" onclick="removeSchedule(\'' + esc(shift.id) + '\')" style="font-size: 10px; padding: 4px 8px;">USUŃ</button></td></tr>';
                        }).join('')}
                    </tbody>
                </table>
            ` : '<div style="color: var(--muted); text-align: center; padding: 20px;">Brak dyżurów.</div>';
        }

        // Funkcje pomocnicze
        function renderAll() { 
            renderPending(); 
            renderDoctors(); 
            renderPatients(); 
            renderSchedule(); 
        }
    </script>
</body>
</html>
