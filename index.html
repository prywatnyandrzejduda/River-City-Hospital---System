<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Hospital System v6.5 Professional</title>
    <style>
        :root { 
            --accent: #00d2d3; --psych: #a29bfe; --bg: #0b0c0d; --card: #1c1f22; 
            --gold: #f1c40f; --red: #ff4757; --green: #2ecc71; --blue: #3498db; --cert: #ff9f43; --discharge: #ee5253;
        }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: #e0e0e0; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar & List */
        #sidebar { width: 320px; background: #141619; border-right: 2px solid #333; padding: 20px; display: flex; flex-direction: column; height: 100vh; flex-shrink: 0; }
        #lista_pacjentow { overflow-y: auto; flex-grow: 1; margin-top: 15px; border-top: 1px solid #333; }
        .p-item-wrapper { display: flex; align-items: center; gap: 5px; margin-bottom: 5px; }
        .p-item { flex: 1; padding: 15px; background: rgba(255,255,255,0.02); border-left: 4px solid transparent; cursor: pointer; transition: 0.2s; }
        .p-item.active { background: #23272b; border-left-color: var(--accent); }
        .p-item.archived { opacity: 0.5; border-left-color: #555; }
        .btn-del-patient { background: var(--red); color: white; width: 40px; height: 48px; border: none; border-radius: 4px; cursor: pointer; font-size: 18px; }

        /* Interface & Tabs */
        #main { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #header-fixed { flex-shrink: 0; background: #141619; border-bottom: 2px solid #333; }
        .tabs-nav { display: flex; background: #0b0c0d; overflow-x: auto; }
        .tab-btn { padding: 15px 20px; color: #777; cursor: pointer; font-weight: 800; font-size: 11px; text-transform: uppercase; border-bottom: 3px solid transparent; white-space: nowrap; }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

        #content-area { flex: 1; overflow-y: auto; padding: 25px; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #2d3136; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .label { font-size: 10px; color: var(--accent); font-weight: 900; text-transform: uppercase; display: block; margin-top: 10px; letter-spacing: 1px; }
        
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; background: #0f1113; border: 1px solid #333; color: white; border-radius: 6px; outline: none; }
        button { padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 10px; }

        /* History */
        .history-item { background: #1c1f23; padding: 15px; border-left: 4px solid #444; margin-top: 10px; border-radius: 4px; position: relative; }
        .history-auth { border-left-color: var(--gold); border: 1px solid rgba(241, 196, 15, 0.2); }
        .btn-del-entry { position: absolute; top: 10px; right: 10px; background: var(--red); color: white; border: none; padding: 5px 8px; border-radius: 3px; font-size: 9px; }
        
        .hidden { display: none !important; }
        .stat-badge { flex: 1; padding: 10px; border-radius: 8px; text-align: center; background: #1c1f22; border: 1px solid #333; margin-bottom: 15px; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2 style="text-align: center; letter-spacing: 2px;">MED-SYSTEM <span style="color:var(--accent)">v6.5</span></h2>
    
    <div style="display: flex; gap: 10px;">
        <div class="stat-badge"><span id="count_active" style="font-size: 20px; font-weight: 900; color: var(--accent);">0</span><br><small>AKTYWNI</small></div>
        <div class="stat-badge" style="border-color: var(--red);"><span id="count_critical" style="font-size: 20px; font-weight: 900; color: var(--red);">0</span><br><small>PILNI</small></div>
    </div>

    <div style="display: flex; gap: 5px; margin-bottom: 15px;">
        <button style="flex:1; background:var(--accent); color:black;" onclick="setView('active')">AKTYWNI</button>
        <button style="flex:1; background:#333; color:white;" onclick="setView('archive')">ARCHIWUM</button>
    </div>

    <input type="text" id="add_name" placeholder="NAZWISKO PACJENTA">
    <button style="background:var(--accent); color:black; width:100%;" onclick="nowyPacjent()">ZAREJESTRUJ</button>
    
    <div id="lista_pacjentow"></div>
</div>

<div id="main">
    <div id="interface" class="hidden" style="display: flex; flex-direction: column; height: 100%;">
        <div id="header-fixed">
            <div style="padding: 15px 25px; display: flex; justify-content: space-between; align-items: center;">
                <h1 id="disp_name" style="margin: 0; font-size: 24px; font-weight: 900;"></h1>
                <div id="cert-status-header" style="font-weight: bold; font-size: 12px;"></div>
            </div>
            <div class="tabs-nav">
                <div class="tab-btn active" onclick="switchTab('tab-ogolne', this)">DASHBOARD</div>
                <div class="tab-btn" onclick="switchTab('tab-psych', this)" style="color:var(--psych);">🧠 PSYCHOLOGIA</div>
                <div class="tab-btn" onclick="switchTab('tab-med', this)">MEDYCYNA</div>
                <div class="tab-btn" onclick="switchTab('tab-exit', this)" style="color:var(--discharge);">🚪 WYPIS / EPIKRYZA</div>
            </div>
        </div>

        <div id="content-area">
            <div id="tab-ogolne" class="tab-content">
                <div class="card" id="main-data-card">
                    <span class="label">Dane Socjalne</span>
                    <div class="grid"><input type="text" id="inp_adr" placeholder="Adres"><input type="text" id="inp_job" placeholder="Zawód"></div>
                    <div class="grid">
                        <select id="inp_blood"><option>Nieznana</option><option>0 Rh+</option><option>0 Rh-</option><option>A Rh+</option><option>A Rh-</option><option>B Rh+</option><option>B Rh-</option><option>AB Rh+</option><option>AB Rh-</option></select>
                        <select id="inp_triage" onchange="updateTriageVisuals()"><option value="none">TRIAGE: BRAK</option><option value="t-green">ZIELONY</option><option value="t-yellow">ŻÓŁTY</option><option value="t-red">CZERWONY</option></select>
                    </div>
                    <span class="label" style="color:var(--red)">Alergie</span>
                    <input type="text" id="inp_alergie">
                </div>
            </div>

            <div id="tab-psych" class="tab-content hidden">
                <div class="card" style="border-top: 5px solid var(--psych);">
                    <h3 style="color:var(--psych); margin-top:0;">BADANIE STANU PSYCHICZNEGO</h3>
                    <div class="grid">
                        <div><span class="label">Orientacja</span><select id="psy_orient"><option>Pełna</option><option>Zaburzona</option></select></div>
                        <div><span class="label">Napęd</span><select id="psy_motor"><option>Norma</option><option>Spowolniony</option><option>Pobudzony</option></select></div>
                    </div>
                    <div style="background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; margin: 15px 0;">
                        <span class="label">Zagrożenia</span>
                        <div style="display:flex; gap:20px; margin-top:10px;">
                            <label><input type="checkbox" id="psy_risk_suicide"> Samobójcze</label>
                            <label><input type="checkbox" id="psy_risk_agg"> Agresja</label>
                        </div>
                    </div>
                    <textarea id="psy_notes" rows="4" placeholder="Opis badania..."></textarea>
                    <button style="background:var(--psych); color:black; width:100%;" onclick="zapiszPsychologie()">ZAPISZ RAPORT PSYCHOLOGICZNY</button>
                </div>
            </div>

            <div id="tab-exit" class="tab-content hidden">
                <div class="card" style="border-top: 5px solid var(--discharge);">
                    <h3 style="color:var(--discharge); margin-top:0;">KARTA WYPISOWA</h3>
                    <div class="grid">
                        <select id="exit_mode"><option>Do domu</option><option>Ucieczka</option><option>Zgon</option></select>
                        <select id="exit_status"><option>Poprawa</option><option>Wyleczony</option><option>Bez zmian</option></select>
                    </div>
                    <span class="label">Epikryza</span>
                    <textarea id="exit_epikryza" rows="4" placeholder="Przebieg leczenia..."></textarea>
                    <span class="label">Zalecenia</span>
                    <textarea id="exit_recom" rows="2" placeholder="Leki, kontrole..."></textarea>
                    <button style="background:var(--discharge); color:white; width:100%;" onclick="finalizujWypis()">ZATWIERDŹ WYPIS I ARCHIWIZUJ</button>
                </div>
            </div>

            <div id="tab-med" class="tab-content hidden"><div class="card">Sekcja Medyczna (Użyj pola wpisu poniżej)</div></div>

            <div class="card" style="border-top: 5px solid var(--green); position: sticky; top: 0; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
                <span class="label">Nowy wpis do historii</span>
                <textarea id="inp_note" rows="3" placeholder="Opisz czynności..."></textarea>
                <div class="grid">
                    <input type="text" id="inp_doc" placeholder="Twoje Imię i Nazwisko">
                    <select id="inp_rank" onchange="renderLista(); pokazHistorie();">
                        <option>Lekarz</option><option>Ratownik</option><option>Ordynator</option>
                        <option>Dyrektor Szpitala</option><option>Zarząd Szpitala</option>
                    </select>
                </div>
                <button style="background:var(--green); color:white; width:100%; margin-top:10px;" onclick="zapiszWpis()">DODAJ WPIS</button>
            </div>
            <div id="historia_kontener"></div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC5MioZo7CMVGopaZANfglS12Gy_TMPzEw",
        authDomain: "baza-danych-cd445.firebaseapp.com",
        databaseURL: "https://baza-danych-cd445-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "baza-danych-cd445",
        storageBucket: "baza-danych-cd445.firebasestorage.app",
        messagingSenderId: "234044597162",
        appId: "1:234044597162:web:f46e383b858a363aea01d3"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let pacjenci = [];
    let aktywIdx = -1;
    let currentView = 'active';

    db.ref('pacjenci').on('value', (s) => {
        const data = s.val();
        pacjenci = data ? (Array.isArray(data) ? data : Object.values(data)) : [];
        updateStats(); renderLista();
        if(aktywIdx !== -1) odswiezDanePacjenta();
    });

    function synchronizuj() {
        const clean = pacjenci.filter(p => p !== null);
        db.ref('pacjenci').set(clean);
    }

    function nowyPacjent() {
        let n = document.getElementById('add_name').value.trim();
        if(!n) return;
        pacjenci.push({ 
            name: n, adr: "", job: "", blood: "Nieznana", alergie: "", triage: "none", arch: false, 
            history: [{txt: "Przyjęto do szpitala", doc: "SYSTEM", rank: "Auto", time: new Date().toLocaleString()}] 
        });
        document.getElementById('add_name').value = "";
        synchronizuj();
    }

    function renderLista() {
        let l = document.getElementById('lista_pacjentow'); l.innerHTML = "";
        let r = document.getElementById('inp_rank').value;
        let isAdmin = (r === "Dyrektor Szpitala" || r === "Zarząd Szpitala");

        pacjenci.forEach((p, i) => {
            if(!p) return;
            if((currentView === 'active' && !p.arch) || (currentView === 'archive' && p.arch)) {
                let wrap = document.createElement('div');
                wrap.className = "p-item-wrapper";
                
                let d = document.createElement('div');
                d.className = `p-item ${aktywIdx === i ? 'active' : ''}`;
                d.innerHTML = `<b>${p.name}</b><br><small>${p.triage.toUpperCase()}</small>`;
                d.onclick = () => { aktywIdx = i; document.getElementById('interface').classList.remove('hidden'); renderLista(); odswiezDanePacjenta(); };
                
                wrap.appendChild(d);
                if(isAdmin) {
                    let del = document.createElement('button');
                    del.className = "btn-del-patient"; del.innerHTML = "🗑️";
                    del.onclick = (e) => { e.stopPropagation(); if(confirm("Usunąć kartotekę?")) { pacjenci.splice(i, 1); aktywIdx=-1; synchronizuj(); } };
                    wrap.appendChild(del);
                }
                l.appendChild(wrap);
            }
        });
    }

    function odswiezDanePacjenta() {
        let p = pacjenci[aktywIdx];
        document.getElementById('disp_name').innerText = p.name;
        document.getElementById('inp_adr').value = p.adr || "";
        document.getElementById('inp_job').value = p.job || "";
        document.getElementById('inp_blood').value = p.blood || "Nieznana";
        document.getElementById('inp_alergie').value = p.alergie || "";
        document.getElementById('inp_triage').value = p.triage || "none";
        updateTriageVisuals();
        pokazHistorie();
    }

    function zapiszWpis() {
        let p = pacjenci[aktywIdx];
        let txt = document.getElementById('inp_note').value.trim();
        let doc = document.getElementById('inp_doc').value.trim();
        let r = document.getElementById('inp_rank').value;
        if(!doc || !txt) return alert("Podpis i treść!");

        p.adr = document.getElementById('inp_adr').value;
        p.job = document.getElementById('inp_job').value;
        p.blood = document.getElementById('inp_blood').value;
        p.alergie = document.getElementById('inp_alergie').value;
        p.triage = document.getElementById('inp_triage').value;

        p.history.push({ txt: txt, doc: doc, rank: r, time: new Date().toLocaleString() });
        document.getElementById('inp_note').value = "";
        synchronizuj();
    }

    function zapiszPsychologie() {
        let risks = [];
        if(document.getElementById('psy_risk_suicide').checked) risks.push("RYZYKO S");
        if(document.getElementById('psy_risk_agg').checked) risks.push("AGRESJA");
        let txt = `[RAPORT PSYCH]\nOrientacja: ${document.getElementById('psy_orient').value}\nZagrożenia: ${risks.join(", ") || "Brak"}\nNotatka: ${document.getElementById('psy_notes').value}`;
        document.getElementById('inp_note').value = txt;
        zapiszWpis();
    }

    function finalizujWypis() {
        if(!confirm("Wypisać pacjenta?")) return;
        let p = pacjenci[aktywIdx];
        let txt = `[WYPIS: ${document.getElementById('exit_mode').value}]\nSTAN: ${document.getElementById('exit_status').value}\nEPIKRYZA: ${document.getElementById('exit_epikryza').value}`;
        p.history.push({ txt: txt, doc: document.getElementById('inp_doc').value, rank: document.getElementById('inp_rank').value, time: new Date().toLocaleString() });
        p.arch = true;
        synchronizuj();
        document.getElementById('interface').classList.add('hidden');
        aktywIdx = -1;
    }

    function usunWpis(hIdx) {
        if(confirm("Usunąć ten wpis?")) {
            pacjenci[aktywIdx].history.splice(hIdx, 1);
            synchronizuj();
        }
    }

    function pokazHistorie() {
        let c = document.getElementById('historia_kontener'), h = pacjenci[aktywIdx].history;
        let r = document.getElementById('inp_rank').value;
        let canDel = (r.includes("Dyrektor") || r.includes("Zarząd") || r.includes("Ordynator"));
        c.innerHTML = "<h3>HISTORIA CHOROBY</h3>";
        h.slice().reverse().forEach((item, revIdx) => {
            let realIdx = h.length - 1 - revIdx;
            let d = document.createElement('div');
            d.className = `history-item ${item.rank.includes("Dyrektor") ? 'history-auth' : ''}`;
            let delBtn = canDel ? `<button class="btn-del-entry" onclick="usunWpis(${realIdx})">USUŃ</button>` : "";
            d.innerHTML = `${delBtn}<small>${item.time}</small><p style="white-space:pre-wrap">${item.txt}</p><b>${item.doc}</b> (${item.rank})`;
            c.appendChild(d);
        });
    }

    function switchTab(id, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.remove('hidden'); btn.classList.add('active');
    }

    function updateTriageVisuals() {
        let v = document.getElementById('inp_triage').value;
        let c = {'none': '#333', 't-green': 'var(--green)', 't-yellow': 'var(--gold)', 't-red': 'var(--red)'}[v];
        document.getElementById('main-data-card').style.borderTop = `5px solid ${c}`;
    }

    function updateStats() {
        document.getElementById('count_active').innerText = pacjenci.filter(p => p && !p.arch).length;
        document.getElementById('count_critical').innerText = pacjenci.filter(p => p && !p.arch && p.triage === 't-red').length;
    }

    function setView(v) { currentView = v; renderLista(); }
</script>
</body>
</html>
