<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Hospital System v5.40 - FULL EDITION</title>
    <style>
        :root { 
            --accent: #00d2d3; --psych: #a29bfe; --bg: #0b0c0d; --card: #1c1f22; 
            --gold: #f1c40f; --red: #ff4757; --green: #2ecc71; --blue: #3498db; --cert: #ff9f43; --docs: #54a0ff; --discharge: #ee5253;
        }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: #e0e0e0; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* SIDEBAR */
        #sidebar { width: 320px; background: #141619; border-right: 2px solid #333; padding: 20px; display: flex; flex-direction: column; height: 100vh; flex-shrink: 0; }
        .admin-sidebar-btn { background: rgba(255, 71, 87, 0.1); color: var(--red); border: 1px solid var(--red); padding: 10px; border-radius: 8px; text-align: center; font-weight: 900; cursor: pointer; margin-bottom: 15px; font-size: 11px; }
        
        .sor-stats { display: flex; gap: 10px; margin-bottom: 15px; }
        .stat-badge { flex: 1; padding: 8px; border-radius: 8px; text-align: center; background: #1c1f22; border: 1px solid #333; }
        .stat-val { display: block; font-size: 18px; font-weight: 900; }
        .stat-lbl { font-size: 8px; text-transform: uppercase; color: #777; }

        #lista_pacjentow { overflow-y: auto; flex-grow: 1; margin-top: 10px; }
        .p-item { padding: 12px; border-bottom: 1px solid #222; cursor: pointer; border-left: 4px solid transparent; transition: 0.2s; background: rgba(255,255,255,0.02); margin-bottom: 5px; }
        .p-item.active { background: #23272b; border-left-color: var(--accent); }
        .p-item.archived { opacity: 0.5; }

        /* MAIN */
        #main { flex: 1; display: flex; flex-direction: column; }
        #header-fixed { background: #141619; border-bottom: 2px solid #333; padding: 10px 20px; }
        .tabs-nav { display: flex; background: #0b0c0d; border-bottom: 1px solid #333; }
        .tab-btn { padding: 12px 15px; color: #777; cursor: pointer; font-weight: 800; font-size: 10px; text-transform: uppercase; border-bottom: 3px solid transparent; }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #2d3136; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        input, textarea, select { width: 100%; padding: 10px; margin: 5px 0; background: #0f1113; border: 1px solid #333; color: white; border-radius: 6px; outline: none; }
        button { padding: 10px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 10px; }
        
        .history-item { background: #1c1f23; padding: 15px; border-left: 4px solid #444; margin-top: 10px; border-radius: 5px; }
        .hidden { display: none !important; }
        .label { font-size: 9px; color: var(--accent); font-weight: 900; text-transform: uppercase; display: block; margin-top: 5px; }
    </style>
</head>
<body>

<div id="sidebar">
    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
        <h3 style="margin:0; color:var(--accent);">MED-SYSTEM v5.4</h3>
        <button onclick="wyloguj()" style="background:#444; color:white; font-size:9px;">WYLOGUJ</button>
    </div>
    
    <div class="admin-sidebar-btn" onclick="window.location.href='admin.html'">🛡️ PANEL DYREKCJI</div>

    <div class="sor-stats">
        <div class="stat-badge"><span class="stat-val" id="count_active">0</span><span class="stat-lbl">Aktywni</span></div>
        <div class="stat-badge"><span class="stat-val" id="count_critical" style="color:var(--red)">0</span><span class="stat-lbl">Krytyczni</span></div>
    </div>

    <div style="display: flex; gap: 5px; margin-bottom: 10px;">
        <button id="btn_view_active" style="flex:1; background:var(--accent);" onclick="setView('active')">LISTA</button>
        <button id="btn_view_arch" style="flex:1; background:#333; color:white;" onclick="setView('archive')">ARCHIWUM</button>
    </div>
    
    <input type="text" id="add_name" placeholder="IMIĘ I NAZWISKO...">
    <button style="background:var(--accent); width:100%;" onclick="nowyPacjent()">REJESTRUJ</button>
    
    <div id="lista_pacjentow"></div>
</div>

<div id="main">
    <div id="interface" class="hidden">
        <div id="header-fixed">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2 id="disp_name" style="margin: 0; color: white;"></h2>
                <button style="background:var(--discharge); color:white;" onclick="archiwizuj()">WYPISZ PACJENTA</button>
            </div>
        </div>
        <div class="tabs-nav">
            <div class="tab-btn active" onclick="switchTab('tab-ogolne', this)">Dashboard</div>
            <div class="tab-btn" onclick="switchTab('tab-med', this)">Badania</div>
            <div class="tab-btn" onclick="switchTab('tab-psych', this)" style="color:var(--psych);">Psychologia</div>
        </div>

        <div id="content-area" style="padding: 20px; overflow-y: auto; height: calc(100vh - 110px);">
            <div id="tab-ogolne" class="tab-content">
                <div class="grid">
                    <div class="card">
                        <span class="label">Dane Podstawowe</span>
                        <input type="text" id="inp_adr" placeholder="Adres">
                        <input type="text" id="inp_job" placeholder="Zawód">
                        <input type="text" id="inp_alergie" placeholder="ALERGIE" style="border-color: var(--red);">
                    </div>
                    <div class="card">
                        <span class="label">Triage & Stan</span>
                        <select id="inp_triage">
                            <option value="none">STANDARD</option>
                            <option value="t-green">ZIELONY (Niski priorytet)</option>
                            <option value="t-yellow">ŻÓŁTY (Pilny)</option>
                            <option value="t-red">CZERWONY (Krytyczny)</option>
                        </select>
                        <select id="inp_status">
                            <option>Stabilny</option><option>Ciężki</option><option>Krytyczny</option><option>Zgon</option>
                        </select>
                        <textarea id="inp_reason" placeholder="Powód przyjęcia" rows="2"></textarea>
                    </div>
                </div>
            </div>

            <div id="tab-med" class="tab-content hidden">
                <div class="card"><h3>Karta badań klinicznych</h3><p>Tu możesz dopisać wyniki morfologii lub EKG.</p></div>
            </div>

            <div class="card" style="border-top: 5px solid var(--green); position: sticky; top: 0; z-index: 10;">
                <span class="label">Dodaj wpis do karty</span>
                <textarea id="inp_note" rows="3" placeholder="Opisz stan, podane leki..."></textarea>
                <div class="grid">
                    <input type="text" id="inp_doc" readonly style="background:#222;">
                    <button style="background:var(--green); color:white;" onclick="zapiszWpis()">ZATWIERDŹ I SYNCHRONIZUJ</button>
                </div>
            </div>
            <div id="historia_kontener"></div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script>
    // 1. LOGOWANIE
    const currentUser = JSON.parse(localStorage.getItem('loggedUser'));
    if (!currentUser) { window.location.href = 'login.html'; }

    const firebaseConfig = {
        apiKey: "AIzaSyC5MioZo7CMVGopaZANfglS12Gy_TMPzEw",
        databaseURL: "https://baza-danych-cd445-default-rtdb.europe-west1.firebasedatabase.app",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let pacjenci = [];
    let aktywIdx = -1;
    let currentView = 'active';

    // 2. FIREBASE SYNC
    db.ref('pacjenci').on('value', (snap) => {
        const data = snap.val();
        pacjenci = data ? (Array.isArray(data) ? data : Object.values(data)) : [];
        renderLista();
        updateStats();
        if(aktywIdx !== -1) odswiez();
    });

    function nowyPacjent() {
        let n = document.getElementById('add_name').value.trim();
        if(!n) return;
        pacjenci.push({ 
            name: n, adr: "", alergie: "", reason: "", status: "Stabilny", triage: "none", arch: false,
            history: [{doc: "SYSTEM", txt: "Pacjent zarejestrowany", time: new Date().toLocaleString()}] 
        });
        db.ref('pacjenci').set(pacjenci);
        document.getElementById('add_name').value = "";
    }

    function renderLista() {
        let l = document.getElementById('lista_pacjentow'); l.innerHTML = "";
        pacjenci.forEach((p, i) => {
            if(!p) return;
            if((currentView === 'active' && !p.arch) || (currentView === 'archive' && p.arch)) {
                let d = document.createElement('div');
                d.className = `p-item ${aktywIdx === i ? 'active' : ''}`;
                d.innerHTML = `<b>${p.name}</b><br><small>${p.status}</small>`;
                d.onclick = () => { aktywIdx = i; document.getElementById('interface').classList.remove('hidden'); odswiez(); renderLista(); };
                l.appendChild(d);
            }
        });
    }

    function odswiez() {
        let p = pacjenci[aktywIdx];
        document.getElementById('disp_name').innerText = p.name;
        document.getElementById('inp_adr').value = p.adr || "";
        document.getElementById('inp_alergie').value = p.alergie || "";
        document.getElementById('inp_reason').value = p.reason || "";
        document.getElementById('inp_status').value = p.status || "Stabilny";
        document.getElementById('inp_triage').value = p.triage || "none";
        document.getElementById('inp_doc').value = currentUser.fullName;
        
        let c = document.getElementById('historia_kontener'); c.innerHTML = "";
        p.history.slice().reverse().forEach(h => {
            c.innerHTML += `<div class="history-item"><small>${h.time}</small><br><b>${h.doc}:</b> ${h.txt}</div>`;
        });
    }

    function zapiszWpis() {
        let p = pacjenci[aktywIdx];
        let txt = document.getElementById('inp_note').value;
        if(!txt) return alert("Wpis nie może być pusty!");
        
        p.adr = document.getElementById('inp_adr').value;
        p.alergie = document.getElementById('inp_alergie').value;
        p.reason = document.getElementById('inp_reason').value;
        p.status = document.getElementById('inp_status').value;
        p.triage = document.getElementById('inp_triage').value;
        p.history.push({ doc: currentUser.fullName, txt: txt, time: new Date().toLocaleString() });
        
        db.ref('pacjenci').set(pacjenci);
        document.getElementById('inp_note').value = "";
        alert("Zsynchronizowano z bazą!");
    }

    function archiwizuj() {
        if(confirm("Czy na pewno wypisać pacjenta?")) {
            pacjenci[aktywIdx].arch = true;
            db.ref('pacjenci').set(pacjenci);
            document.getElementById('interface').classList.add('hidden');
            aktywIdx = -1;
        }
    }

    function updateStats() {
        document.getElementById('count_active').innerText = pacjenci.filter(p => p && !p.arch).length;
        document.getElementById('count_critical').innerText = pacjenci.filter(p => p && !p.arch && p.triage === 't-red').length;
    }

    function setView(v) { currentView = v; renderLista(); }

    function switchTab(id, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.remove('hidden');
        btn.classList.add('active');
    }

    function wyloguj() { localStorage.removeItem('loggedUser'); window.location.href = 'login.html'; }
</script>
</body>
</html>
