<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Hospital System v5.40 - FULL EDITION</title>
    <style>
        :root { 
            --accent: #00d2d3; --psych: #a29bfe; --bg: #0b0c0d; --card: #1c1f22; 
            --gold: #f1c40f; --red: #ff4757; --green: #2ecc71; --blue: #3498db; --cert: #ff9f43; --docs: #54a0ff; --discharge: #ee5253;
        }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: #e0e0e0; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* SIDEBAR */
        #sidebar { width: 320px; background: #141619; border-right: 2px solid #333; padding: 20px; display: flex; flex-direction: column; height: 100vh; flex-shrink: 0; }
        .sor-stats { display: flex; gap: 10px; margin-bottom: 15px; }
        .stat-badge { flex: 1; padding: 8px; border-radius: 8px; text-align: center; background: #1c1f22; border: 1px solid #333; }
        .stat-val { display: block; font-size: 18px; font-weight: 900; }
        .stat-lbl { font-size: 8px; text-transform: uppercase; color: #777; }

        #lista_pacjentow { overflow-y: auto; flex-grow: 1; margin-top: 10px; }
        .p-item { padding: 12px; border-bottom: 1px solid #222; cursor: pointer; border-left: 4px solid transparent; transition: 0.2s; background: rgba(255,255,255,0.02); margin-bottom: 5px; }
        .p-item.active { background: #23272b; border-left-color: var(--accent); }
        .p-item.archived { opacity: 0.5; }

        /* MAIN */
        #main { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #header-fixed { background: #141619; border-bottom: 2px solid #333; padding: 0; flex-shrink: 0; }
        .tabs-nav { display: flex; background: #0b0c0d; border-bottom: 1px solid #333; overflow-x: auto; }
        .tab-btn { padding: 12px 15px; color: #777; cursor: pointer; font-weight: 800; font-size: 10px; text-transform: uppercase; border-bottom: 3px solid transparent; white-space: nowrap; }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

        #content-area { flex: 1; overflow-y: auto; padding: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #2d3136; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        input, textarea, select { width: 100%; padding: 10px; margin: 5px 0; background: #0f1113; border: 1px solid #333; color: white; border-radius: 6px; outline: none; }
        button { padding: 10px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 10px; transition: 0.2s; }
        
        .med-action-btn { background: #2d3136; color: white; border: 1px solid #444; margin-bottom: 5px; width: 100%; }
        .history-item { background: #1c1f23; padding: 15px; border-left: 4px solid #444; margin-top: 10px; border-radius: 5px; position: relative; }
        .history-auth { border-left-color: var(--gold); border: 1px solid rgba(241, 196, 15, 0.2); }
        .cert-box { padding: 10px; border-radius: 8px; text-align: center; font-weight: bold; border: 1px solid #444; }
        .status-ok { background: rgba(46, 204, 113, 0.2); color: var(--green); border-color: var(--green); }
        .status-no { background: rgba(231, 76, 60, 0.2); color: var(--red); border-color: var(--red); }
        .hidden { display: none !important; }
        .label { font-size: 9px; color: var(--accent); font-weight: 900; text-transform: uppercase; display: block; margin-top: 5px; }
        .del-patient-btn { background: var(--red); color: white; padding: 5px; margin-left: 5px; }
        .del-entry-btn { position: absolute; right: 10px; top: 10px; background: var(--red); color: white; padding: 2px 6px; font-size: 8px; }
        .calc-box { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 8px; border: 1px solid #444; margin-bottom: 15px; }
    </style>
</head>
<body>

<div id="sidebar">
    <h3 style="margin:0 0 15px 0; color:var(--accent); text-align: center;">MED-SYSTEM v5.40</h3>
    
    <div class="sor-stats">
        <div class="stat-badge">
            <span class="stat-val" id="count_active">0</span>
            <span class="stat-lbl">Aktywni</span>
        </div>
        <div class="stat-badge" style="border-color: var(--red);">
            <span class="stat-val" id="count_critical" style="color:var(--red);">0</span>
            <span class="stat-lbl">Krytyczni</span>
        </div>
    </div>

    <div style="display: flex; gap: 5px; margin-bottom: 10px;">
        <button style="flex:1; background:var(--accent); color:black;" onclick="setView('active')">AKTYWNI</button>
        <button style="flex:1; background:#333; color:white;" onclick="setView('archive')">ARCHIWUM</button>
    </div>

    <input type="text" id="add_name" placeholder="IMIĘ I NAZWISKO">
    <button style="background:var(--accent); color:black; width:100%;" onclick="nowyPacjent()">REJESTRUJ</button>
    
    <div id="lista_pacjentow"></div>
</div>

<div id="main">
    <div id="interface" class="hidden">
        <div id="header-fixed">
            <div style="padding: 15px 25px; display: flex; justify-content: space-between; align-items: center;">
                <h1 id="disp_name" style="margin: 0; color: white; font-size: 22px;"></h1>
                <div id="cert-status-header" class="cert-box" style="margin:0; font-size:10px; min-width: 150px;">BRAK BADAŃ</div>
            </div>
            <div class="tabs-nav">
                <div class="tab-btn active" onclick="switchTab('tab-ogolne', this)">DASHBOARD</div>
                <div class="tab-btn" onclick="switchTab('tab-med', this)">MEDYCYNA</div>
                <div class="tab-btn" onclick="switchTab('tab-psych', this)" style="color:var(--psych);">PSYCHIATRIA</div>
                <div class="tab-btn" onclick="switchTab('tab-cert', this)" style="color:var(--cert);">ORZECZENIA</div>
                <div class="tab-btn" onclick="switchTab('tab-docs', this)" style="color:var(--docs);">DOKUMENTY</div>
                <div class="tab-btn" onclick="switchTab('tab-exit', this)" style="color:var(--discharge);">WYPIS</div>
                <button onclick="window.location.href='admin.html'" style="background:var(--red); color:white; margin:5px; padding:5px 10px;">ADMIN</button>
            </div>
        </div>

        <div id="content-area">
            <div id="tab-ogolne" class="tab-content">
                <div class="grid">
                    <div class="card" id="main-data-card" style="border-top: 5px solid var(--accent);">
                        <span class="label">Dane Pacjenta</span>
                        <input type="text" id="inp_adr" placeholder="Adres">
                        <input type="text" id="inp_job" placeholder="Zawód">
                        <div class="grid">
                            <input type="text" id="inp_ins" placeholder="Ubezpieczenie">
                            <select id="inp_blood">
                                <option>Grupa Krwi: Nieznana</option>
                                <option>0 Rh+</option><option>0 Rh-</option><option>A Rh+</option><option>A Rh-</option>
                                <option>B Rh+</option><option>B Rh-</option><option>AB Rh+</option><option>AB Rh-</option>
                            </select>
                        </div>
                        <span class="label" style="color:var(--red)">Alergie</span>
                        <input type="text" id="inp_alergie" style="border-color:var(--red)">
                    </div>
                    <div class="card">
                        <span class="label">Triage & Stan</span>
                        <select id="inp_triage" onchange="updateTriageVisuals()">
                            <option value="none">STANDARD</option>
                            <option value="t-green">ZIELONY (Lekki)</option>
                            <option value="t-yellow">ŻÓŁTY (Pilny)</option>
                            <option value="t-red">CZERWONY (Krytyczny)</option>
                        </select>
                        <select id="inp_status">
                            <option>Stabilny</option><option>Ciężki</option><option>Krytyczny</option><option>Zgon</option>
                        </select>
                        <button class="med-action-btn" onclick="addNote('ALARM: STEMI!')">STEMI</button>
                        <button class="med-action-btn" onclick="addNote('ALARM: UDAR!')">UDAR</button>
                    </div>
                </div>
                <span class="label">Powód Przyjęcia</span>
                <textarea id="inp_reason" rows="2"></textarea>
            </div>

            <div id="tab-med" class="tab-content hidden">
                <div class="grid">
                    <div class="card" style="border-left: 5px solid var(--blue);">
                        <span class="label">Leki</span>
                        <select id="sel_lek">
                            <option value="">-- Wybierz Lek --</option>
                            <option>Morfina</option><option>Fentanyl</option><option>Ketamina</option>
                            <option>Adrenalina</option><option>Amiodaron</option><option>Glukoza 40%</option>
                        </select>
                        <div class="grid"><input type="number" id="med_dose" placeholder="Dawka"><select id="med_unit"><option>mg</option><option>μg</option><option>ml</option></select></div>
                        <button style="background:var(--blue); color:white; width:100%;" onclick="podajLek()">PODAJ LEK</button>
                    </div>
                    <div class="card" style="border-left: 5px solid var(--gold);">
                        <span class="label">Parametry</span>
                        <div class="grid"><input type="text" id="vit_bp" placeholder="BP"><input type="text" id="vit_hr" placeholder="HR"></div>
                        <div class="grid"><input type="text" id="vit_spo2" placeholder="SpO2 %"><input type="text" id="vit_temp" placeholder="Temp"></div>
                        <button style="background:var(--gold); color:black; width:100%;" onclick="logVitals()">ZAPISZ VITALS</button>
                    </div>
                </div>
            </div>

            <div id="tab-psych" class="tab-content hidden">
                <div class="card" style="border-top: 5px solid var(--psych);">
                    <span class="label">Badanie MSE</span>
                    <div class="grid">
                        <select id="psy_motor"><option>Napęd: Norma</option><option>Pobudzony</option><option>Spowolniony</option></select>
                        <select id="sel_mood"><option>Nastrój: Wyrównany</option><option>Obniżony</option><option>Lękowy</option></select>
                    </div>
                    <textarea id="psy_notes" placeholder="Obserwacje..."></textarea>
                    <button style="background:var(--psych); color:black; width:100%;" onclick="logPsych()">ZAPISZ MSE</button>
                </div>
            </div>

            <div id="tab-cert" class="tab-content hidden">
                <div class="card" style="border-top: 5px solid var(--cert);">
                    <span class="label">Orzecznictwo</span>
                    <input type="text" id="cert_target" placeholder="Cel badania">
                    <select id="cert_final">
                        <option value="BRAK">Wybierz werdykt...</option>
                        <option value="OK">ZDOLNY</option>
                        <option value="NO">NIEZDOLNY</option>
                    </select>
                    <button style="background:var(--cert); color:black; width:100%;" onclick="generujOrzeczenie()">WYSTAW ORZECZENIE</button>
                </div>
            </div>

            <div id="tab-exit" class="tab-content hidden">
                <div class="card" style="border-top: 5px solid var(--discharge);">
                    <span class="label">Wypis</span>
                    <textarea id="exit_epikryza" placeholder="Epikryza końcowa..."></textarea>
                    <button style="background:var(--discharge); color:white; width:100%;" onclick="finalizujWypis()">ZARCHIWIZUJ PACJENTA</button>
                </div>
            </div>

            <div class="card" style="border-top: 5px solid var(--green); position: sticky; bottom: 0; z-index: 100;">
                <span class="label">Nowy Wpis</span>
                <textarea id="inp_note" rows="2" placeholder="Treść wpisu..."></textarea>
                <div class="grid">
                    <input type="text" id="inp_doc" placeholder="Podpis (Lekarz/Ratownik)">
                    <select id="inp_rank">
                        <option>Student Medycyny</option><option>Ratownik Medyczny</option>
                        <option>Lekarz Rezydent</option><option>Lekarz Specjalista</option>
                        <option>Ordynator</option><option>Zarząd Szpitala</option>
                    </select>
                </div>
                <button style="background:var(--green); color:white; width:100%; margin-top:5px;" onclick="zapiszWpis()">DODAJ WPIS</button>
            </div>

            <div id="historia_kontener"></div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC5MioZo7CMVGopaZANfglS12Gy_TMPzEw",
        databaseURL: "https://baza-danych-cd445-default-rtdb.europe-west1.firebasedatabase.app",
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let pacjenci = [];
    let aktywIdx = -1;
    let currentView = 'active';

    db.ref('pacjenci').on('value', (snapshot) => {
        const data = snapshot.val();
        pacjenci = data ? (Array.isArray(data) ? data : Object.values(data)) : [];
        updateStats();
        renderLista();
        if(aktywIdx !== -1) odswiezDanePacjenta();
    });

    function synchronizuj() {
        db.ref('pacjenci').set(pacjenci);
    }

    function updateStats() {
        let active = pacjenci.filter(p => p && !p.arch).length;
        let critical = pacjenci.filter(p => p && !p.arch && (p.status === "Krytyczny" || p.triage === "t-red")).length;
        document.getElementById('count_active').innerText = active;
        document.getElementById('count_critical').innerText = critical;
    }

    function nowyPacjent() {
        let n = document.getElementById('add_name').value.trim();
        if(!n) return alert("Wpisz imię i nazwisko!");
        pacjenci.push({ 
            name: n, adr: "", job: "", ins: "", blood: "Nieznana", alergie: "", 
            reason: "", status: "Stabilny", triage: "none", cert: "BRAK", 
            arch: false, history: [{id: Date.now(), txt: "Rejestracja pacjenta", doc: "SYSTEM", rank: "Automatyczny", time: new Date().toLocaleString()}] 
        });
        document.getElementById('add_name').value = "";
        synchronizuj();
    }

    function renderLista() {
        let l = document.getElementById('lista_pacjentow'); l.innerHTML = "";
        let r = document.getElementById('inp_rank').value;
        let isAdmin = (r === "Zarząd Szpitala" || r === "Ordynator");

        pacjenci.forEach((p, i) => {
            if(!p) return;
            if((currentView === 'active' && !p.arch) || (currentView === 'archive' && p.arch)) {
                let wrap = document.createElement('div');
                wrap.style.display = "flex"; wrap.style.marginBottom = "5px";

                let d = document.createElement('div');
                d.className = `p-item ${aktywIdx === i ? 'active' : ''}`;
                d.style.flex = "1";
                d.innerHTML = `<b>${p.name}</b><br><small>${p.status}</small>`;
                d.onclick = () => { aktywIdx = i; document.getElementById('interface').classList.remove('hidden'); renderLista(); odswiezDanePacjenta(); };
                wrap.appendChild(d);

                if(isAdmin) {
                    let del = document.createElement('button');
                    del.className = "del-patient-btn"; del.innerText = "X";
                    del.onclick = (e) => { e.stopPropagation(); usunPacjenta(i); };
                    wrap.appendChild(del);
                }
                l.appendChild(wrap);
            }
        });
    }

    function usunPacjenta(i) {
        if(confirm("Usunąć trwale pacjenta?")) { pacjenci.splice(i, 1); aktywIdx = -1; synchronizuj(); }
    }

    function odswiezDanePacjenta() {
        let p = pacjenci[aktywIdx]; if(!p) return;
        document.getElementById('disp_name').innerText = p.name;
        document.getElementById('inp_adr').value = p.adr || "";
        document.getElementById('inp_job').value = p.job || "";
        document.getElementById('inp_blood').value = p.blood || "Nieznana";
        document.getElementById('inp_status').value = p.status || "Stabilny";
        document.getElementById('inp_triage').value = p.triage || "none";
        updateTriageVisuals();
        updateCertVisuals(p.cert);
        pokazHistorie();
    }

    function zapiszWpis() {
        if(aktywIdx === -1) return;
        let p = pacjenci[aktywIdx];
        let txt = document.getElementById('inp_note').value.trim();
        let doc = document.getElementById('inp_doc').value.trim();
        let r = document.getElementById('inp_rank').value;
        if(!doc) return alert("Podpisz się!");

        p.adr = document.getElementById('inp_adr').value;
        p.status = document.getElementById('inp_status').value;
        p.triage = document.getElementById('inp_triage').value;

        if(txt) {
            if(!p.history) p.history = [];
            p.history.push({ id: Date.now(), txt: txt, doc: doc, rank: r, time: new Date().toLocaleString() });
            document.getElementById('inp_note').value = "";
        }
        synchronizuj();
    }

    function pokazHistorie() {
        let c = document.getElementById('historia_kontener'), p = pacjenci[aktywIdx];
        c.innerHTML = "<h3>HISTORIA MEDYCZNA</h3>";
        if(!p.history) return;
        p.history.slice().reverse().forEach(h => {
            let div = document.createElement('div');
            div.className = "history-item";
            div.innerHTML = `<small>${h.time}</small><p>${h.txt}</p><b>${h.doc}</b> (${h.rank})`;
            c.appendChild(div);
        });
    }

    function switchTab(id, b) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(id).classList.remove('hidden');
        b.classList.add('active');
    }

    function updateTriageVisuals() {
        let val = document.getElementById('inp_triage').value;
        let colors = {'none':'#333', 't-green':'var(--green)', 't-yellow':'var(--gold)', 't-red':'var(--red)'};
        document.getElementById('main-data-card').style.borderTopColor = colors[val];
    }

    function updateCertVisuals(s) {
        let h = document.getElementById('cert-status-header');
        h.innerText = s === 'OK' ? 'DOPUSZCZONY' : (s === 'NO' ? 'NIEZDOLNY' : 'BRAK BADAŃ');
        h.className = 'cert-box ' + (s === 'OK' ? 'status-ok' : (s === 'NO' ? 'status-no' : ''));
    }

    function addNote(t) { document.getElementById('inp_note').value += t; }
    function logVitals() { addNote(`VITALS: BP ${document.getElementById('vit_bp').value}, HR ${document.getElementById('vit_hr').value}`); }
    function podajLek() { addNote(`PODANO: ${document.getElementById('sel_lek').value} ${document.getElementById('med_dose').value}${document.getElementById('med_unit').value}`); }
    function logPsych() { addNote(`MSE: ${document.getElementById('psy_motor').value}, ${document.getElementById('sel_mood').value}`); }
    function setView(v) { currentView = v; renderLista(); }
    
    function generujOrzeczenie() {
        let f = document.getElementById('cert_final').value;
        if(f === 'BRAK') return alert("Wybierz werdykt!");
        pacjenci[aktywIdx].cert = f;
        addNote(`WYSTAWIONO ORZECZENIE: ${f === 'OK' ? 'ZDOLNY' : 'NIEZDOLNY'} - CEL: ${document.getElementById('cert_target').value}`);
        zapiszWpis();
    }

    function finalizujWypis() {
        if(confirm("Czy na pewno chcesz wypisać i zarchiwizować pacjenta?")) {
            pacjenci[aktywIdx].arch = true;
            addNote(`WYPIS: ${document.getElementById('exit_epikryza').value}`);
            zapiszWpis();
            document.getElementById('interface').classList.add('hidden');
        }
    }
</script>

</body>
</html>
