<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hospital System - Karta Główna</title>

  <!-- Firebase (compat) -->
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyC5MioZo7CMVGopaZANfglS12Gy_TMPzEw",
      authDomain: "baza-danych-cd445.firebaseapp.com",
      databaseURL: "https://baza-danych-cd445-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "baza-danych-cd445",
      storageBucket: "baza-danych-cd445.firebasestorage.app",
      messagingSenderId: "234044597162",
      appId: "1:234044597162:web:f46e383b858a363aea01d3"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();

    function hasValidSessionFromSessionStorage() {
      const raw = sessionStorage.getItem("hospital_auth");
      if (!raw) return false;

      try {
        const obj = JSON.parse(raw);
        const role = obj?.role || obj?.type;
        return role === "doctor" || role === "admin" || obj?.type === "doctor" || obj?.type === "admin";
      } catch {
        return false;
      }
    }

    async function authGuard() {
      // 1) sessionStorage
      if (hasValidSessionFromSessionStorage()) return true;

      // 2) Firebase Auth (jeśli używasz)
      try {
        const user = firebase.auth && firebase.auth().currentUser;
        if (user) return true;
      } catch {}

      // Brak portal.html, więc blokujemy zamiast przekierowania
      alert("Brak autoryzacji. Zaloguj się w systemie (ustaw sessionStorage.hospital_auth).");
      return false;
    }

    function uid(prefix) {
      return prefix + "-" + Date.now().toString(36).toUpperCase() + "-" + Math.floor(Math.random() * 9999).toString().padStart(4, "0");
    }

    function esc(s) {
      return String(s ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function normalizePatients(snapshotVal) {
      if (!snapshotVal) return [];
      if (Array.isArray(snapshotVal)) return snapshotVal;

      const arr = [];
      for (const [k, v] of Object.entries(snapshotVal)) {
        if (!v) continue;
        arr.push({ firebaseKey: k, ...v, id: v.id || k });
      }

      arr.sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
      return arr;
    }

    // App state
    let patients = [];
    let activeIndex = -1;
    let activeFirebaseKey = null;

    function bindForm() {
      const p = patients[activeIndex];
      if (!p) return;

      document.getElementById("f_name").value = p.name || "";
      document.getElementById("f_age").value = p.age ?? "";
      document.getElementById("f_adr").value = p.adr || "";
      document.getElementById("f_job").value = p.job || "";
      document.getElementById("f_ins").value = p.ins || "";
      document.getElementById("f_blood").value = p.blood || "";
      document.getElementById("f_status").value = p.status || "Stabilny";
      document.getElementById("f_triage").value = p.triage || "none";
      document.getElementById("f_reason").value = p.reason || "";

      document.getElementById("n_doc").value = "Lekarz";
      document.getElementById("n_rank").value = "doctor";
    }

    function renderList() {
      const list = document.getElementById("lista");
      if (!list) return;

      list.innerHTML = patients.length
        ? patients.map((p, i) => {
            const isActive = i === activeIndex;
            return `<div class="item ${isActive ? "active" : ""}" onclick="openCard(${i})">
                      <b>${esc(p.name || "Bez nazwy")}</b><br>
                      <small>${esc(p.status || "-")}</small>
                    </div>`;
          }).join("")
        : `<div class="muted">Brak kart.</div>`;
    }

    function renderHistory() {
      const wrap = document.getElementById("history_wrap");
      const p = patients[activeIndex];

      if (!wrap) return;

      if (!p || !p.history || !p.history.length) {
        wrap.className = "muted";
        wrap.textContent = "Wybierz kartę pacjenta.";
        return;
      }

      wrap.className = "";
      wrap.innerHTML = (p.history || []).slice().reverse().map(h => {
        const time = h.time || h.ts || "";
        return `<div class="history">
                  <small>${esc(time)}</small><br>
                  <b>${esc(h.doc || "")}</b> (${esc(h.rank || "")})<br>
                  ${esc(h.txt || "")}
                </div>`;
      }).join("");
    }

    function openCard(i) {
      activeIndex = i;
      const p = patients[activeIndex];
      activeFirebaseKey = p ? p.firebaseKey : null;

      bindForm();
      renderList();
      renderHistory();
    }

    function commitActivePatient(nextPatient) {
      if (!activeFirebaseKey) return;
      db.ref("patients/" + activeFirebaseKey).set(nextPatient);
    }

    function nowyPacjent() {
      const nameEl = document.getElementById("add_name");
      const name = (nameEl?.value || "").trim();
      if (!name) return;

      const parts = name.split(" ").filter(Boolean);
      const imie = parts[0] || "Nieznane";
      const nazwisko = parts.slice(1).join(" ") || name;

      const nowy = {
        id: uid("MED"),
        patientId: "",
        name,
        imie,
        nazwisko,
        age: 0,
        gender: "K",
        adr: "",
        job: "",
        ins: "",
        insNumber: "",
        blood: "Nieznana",
        reason: "",
        status: "Stabilny",
        triage: "none",
        cert: "BRAK",
        arch: false,
        role: "user",
        createdAt: Date.now(),
        history: [
          {
            id: Date.now(),
            time: new Date().toLocaleString(),
            txt: "Utworzono kartę medyczną.",
            doc: "SYSTEM",
            rank: "Automatyczny",
            ts: Date.now()
          }
        ]
      };

      // PUSH -> Firebase (UI odświeży listener)
      db.ref("patients").push(nowy);

      if (nameEl) nameEl.value = "";
    }

    // Zachowujemy nazwy wywołań z HTML
    function createPatientCard() {
      nowyPacjent();
    }

    function saveCard() {
      const p = patients[activeIndex];
      if (!p) return;

      const next = {
        ...p,
        name: document.getElementById("f_name").value.trim(),
        age: Number(document.getElementById("f_age").value || 0),
        adr: document.getElementById("f_adr").value.trim(),
        job: document.getElementById("f_job").value.trim(),
        ins: document.getElementById("f_ins").value.trim(),
        blood: document.getElementById("f_blood").value.trim(),
        status: document.getElementById("f_status").value,
        triage: document.getElementById("f_triage").value,
        reason: document.getElementById("f_reason").value.trim()
      };

      commitActivePatient(next);
    }

    function addHistory() {
      const p = patients[activeIndex];
      if (!p) return;

      const txt = document.getElementById("n_text").value.trim();
      if (!txt) return;

      const history = (p.history || []).concat([{
        id: Date.now(),
        time: new Date().toLocaleString(),
        txt,
        doc: document.getElementById("n_doc").value.trim() || "Lekarz",
        rank: document.getElementById("n_rank").value.trim() || "doctor",
        ts: Date.now()
      }]);

      document.getElementById("n_text").value = "";

      commitActivePatient({ ...p, history });
    }

    function setTab(tab) {
      const p = tab === "profile";
      document.getElementById("tab_profile").style.display = p ? "block" : "none";
      document.getElementById("tab_notes").style.display = p ? "none" : "block";
      document.getElementById("tab_profile_btn").classList.toggle("active", p);
      document.getElementById("tab_notes_btn").classList.toggle("active", !p);
    }

    function listenToPatients() {
      db.ref("patients").on("value", (snapshot) => {
        const nextPatients = normalizePatients(snapshot.val());
        patients = nextPatients;

        // utrzymanie aktywnego pacjenta po zmianach
        if (activeFirebaseKey) {
          const newIndex = patients.findIndex(p => p.firebaseKey === activeFirebaseKey);
          if (newIndex !== -1) {
            activeIndex = newIndex;
          } else {
            activeIndex = -1;
            activeFirebaseKey = null;
          }
        } else {
          activeIndex = -1;
        }

        renderList();
        if (activeIndex !== -1) {
          bindForm();
          renderHistory();
        } else {
          renderHistory();
        }
      });
    }

    document.addEventListener("DOMContentLoaded", async () => {
      const ok = await authGuard();
      if (!ok) return;
      listenToPatients();
    });
  </script>

  <style>
    :root { --bg:#05070b; --glass:rgba(255,255,255,.05); --line:rgba(255,255,255,.12); --text:#e8eef9; --muted:#9ca8ba; --doc:#33c7ff; --warn:#f1c40f; --err:#ff5c73; --ok:#37ff94; }
    * { box-sizing: border-box; font-family: Consolas, "Courier New", monospace; }
    body { margin:0; color:var(--text); background: radial-gradient(circle at 15% 5%, #122840, transparent 40%), linear-gradient(140deg,#040609,#0b121c); display:flex; height:100vh; overflow:hidden; }
    #sidebar { width:320px; background:var(--glass); backdrop-filter: blur(15px); border-right:1px solid var(--line); padding:16px; display:flex; flex-direction:column; }
    #lista { overflow-y:auto; margin-top:12px; flex:1; }
    .item { padding:10px; border:1px solid var(--line); border-radius:8px; margin-bottom:8px; cursor:pointer; background: rgba(12,20,33,.7); }
    .item.active { border-color: var(--doc); box-shadow: 0 0 14px rgba(51,199,255,.35); }
    input, select, textarea, button { width:100%; padding:10px; margin-bottom:8px; border-radius:8px; border:1px solid var(--line); background:rgba(10,18,30,.78); color:var(--text); }
    button { cursor:pointer; font-weight:700; text-transform:uppercase; transition:.2s ease; }
    .btn:hover { box-shadow: 0 0 14px rgba(51,199,255,.38); }
    .tabs { display:flex; gap:8px; margin-bottom:10px; }
    .tab-btn { flex:1; }
    .tab-btn.active { border-color: var(--doc); color: var(--doc); }
    #main { flex:1; overflow:auto; padding:16px; }
    .card { background:var(--glass); backdrop-filter: blur(15px); border:1px solid var(--line); border-radius:12px; padding:14px; margin-bottom:12px; }
    .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .history { border-left:3px solid var(--line); padding:8px; margin-bottom:8px; background: rgba(9,15,24,.75); border-radius:8px; }
    .muted { color:var(--muted); font-size:12px; }
    @media (max-width:950px){ body { flex-direction: column; height:auto; } #sidebar { width:100%; } .grid2 { grid-template-columns:1fr; } }
  </style>
</head>

<body>
  <div id="sidebar">
    <h2>MED-SYSTEM</h2>
    <div class="muted">Główna baza <span style="color:var(--doc)">Firebase</span></div>
    <button onclick="location.href='start.html'">POWRÓT START</button>
    <input id="add_name" placeholder="Imię i nazwisko" />
    <button class="btn" onclick="createPatientCard()">NOWA KARTA</button>
    <div id="lista"></div>
  </div>

  <div id="main">
    <div class="card">
      <div class="tabs">
        <button id="tab_profile_btn" class="tab-btn active" onclick="setTab('profile')">Dane</button>
        <button id="tab_notes_btn" class="tab-btn" onclick="setTab('notes')">Historia</button>
      </div>

      <div id="tab_profile">
        <div class="grid2">
          <input id="f_name" placeholder="Imię i nazwisko" />
          <input id="f_age" type="number" placeholder="Wiek" />
        </div>
        <div class="grid2">
          <input id="f_adr" placeholder="Adres" />
          <input id="f_job" placeholder="Zawód" />
        </div>
        <div class="grid2">
          <input id="f_ins" placeholder="Ubezpieczenie (TAK/NIE)" />
          <input id="f_blood" placeholder="Grupa krwi" />
        </div>
        <div class="grid2">
          <select id="f_status">
            <option>Stabilny</option>
            <option>Ciężki</option>
            <option>Krytyczny</option>
            <option>Zgon</option>
          </select>
          <select id="f_triage">
            <option value="none">STANDARD</option>
            <option value="t-green">ZIELONY</option>
            <option value="t-yellow">ŻÓŁTY</option>
            <option value="t-red">CZERWONY</option>
          </select>
        </div>

        <textarea id="f_reason" rows="3" placeholder="Powód przyjęcia"></textarea>
        <button class="btn" onclick="saveCard()">ZAPISZ DANE KARTY</button>
      </div>

      <div id="tab_notes" style="display:none;">
        <textarea id="n_text" rows="4" placeholder="Treść wpisu"></textarea>
        <div class="grid2">
          <input id="n_doc" placeholder="Podpis" />
          <input id="n_rank" placeholder="Ranga" />
        </div>
        <button class="btn" onclick="addHistory()">DODAJ WPIS</button>
      </div>
    </div>

    <div class="card">
      <h3>Historia medyczna</h3>
      <div id="history_wrap" class="muted">Wybierz kartę pacjenta.</div>
    </div>
  </div>
</body>
</html>
