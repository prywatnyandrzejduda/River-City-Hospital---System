<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Hospital System v5.35 - Admin Edition</title>
    <style>
        :root { 
            --accent: #00d2d3; --psych: #a29bfe; --bg: #0b0c0d; --card: #1c1f22; 
            --gold: #f1c40f; --red: #ff4757; --green: #2ecc71; --blue: #3498db; --cert: #ff9f43; --docs: #54a0ff; --discharge: #ee5253;
        }
        * { box-sizing: border-box; font-family: 'Inter', 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: #e0e0e0; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* SIDEBAR */
        #sidebar { width: 320px; background: #141619; border-right: 2px solid #333; padding: 20px; display: flex; flex-direction: column; height: 100vh; flex-shrink: 0; }
        
        /* PRZYCISK ADMINA W SIDEBARZE */
        .admin-sidebar-btn {
            background: rgba(255, 71, 87, 0.1);
            color: var(--red);
            border: 1px solid var(--red);
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: 900;
            cursor: pointer;
            margin-bottom: 20px;
            transition: 0.3s;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .admin-sidebar-btn:hover { background: var(--red); color: white; box-shadow: 0 0 15px rgba(255, 71, 87, 0.4); }

        #lista_pacjentow { overflow-y: auto; flex-grow: 1; margin-top: 15px; border-top: 1px solid #333; }
        .p-item { padding: 15px; border-bottom: 1px solid #222; cursor: pointer; border-left: 4px solid transparent; transition: 0.2s; background: rgba(255,255,255,0.02); margin-bottom: 5px; }
        .p-item.active { background: #23272b; border-left-color: var(--accent); }
        .p-item.archived { opacity: 0.5; border-left-color: #555; }

        .sor-stats { display: flex; gap: 10px; margin-bottom: 15px; }
        .stat-badge { flex: 1; padding: 10px; border-radius: 8px; text-align: center; background: #1c1f22; border: 1px solid #333; }
        .stat-val { display: block; font-size: 20px; font-weight: 900; }
        .stat-lbl { font-size: 9px; text-transform: uppercase; color: #777; }

        /* MAIN AREA */
        #main { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #header-fixed { flex-shrink: 0; background: #141619; border-bottom: 2px solid #333; z-index: 100; }
        .tabs-nav { display: flex; padding: 0 10px; overflow-x: auto; background: #0b0c0d; border-bottom: 1px solid #333; }
        .tab-btn { padding: 15px 20px; color: #777; cursor: pointer; font-weight: 800; font-size: 11px; text-transform: uppercase; border-bottom: 3px solid transparent; white-space: nowrap; }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

        #content-area { flex: 1; overflow-y: auto; padding: 25px; scroll-behavior: smooth; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #2d3136; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .label { font-size: 10px; color: var(--accent); font-weight: 900; text-transform: uppercase; display: block; margin-top: 10px; letter-spacing: 1px; }
        
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; background: #0f1113; border: 1px solid #333; color: white; border-radius: 6px; font-size: 14px; outline: none; }
        button { padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 10px; transition: 0.2s; }
        
        .med-action-btn { background: #2d3136; color: white; border: 1px solid #444; margin-bottom: 5px; text-align: center; width: 100%; }
        .history-item { background: #1c1f23; padding: 20px; border-left: 6px solid #444; margin-top: 15px; border-radius: 8px; position: relative; }
        .history-auth { border-left-color: var(--gold); border: 1px solid rgba(241, 196, 15, 0.2); }
        .cert-box { padding: 10px; border-radius: 8px; text-align: center; font-weight: bold; border: 1px solid #444; }
        .status-ok { background: rgba(46, 204, 113, 0.2); color: var(--green); border-color: var(--green); }
        .status-no { background: rgba(231, 76, 60, 0.2); color: var(--red); border-color: var(--red); }
        .hidden { display: none !important; }
        
        .del-entry-btn { position: absolute; top: 10px; right: 10px; background: var(--red); color: white; padding: 5px 10px; font-size: 9px; }
        .del-patient-btn { background: var(--red); color: white; width: 40px; height: 45px; margin-left: 5px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2 style="color: white; text-align: center; letter-spacing: 2px; margin-bottom: 10px;">MED-SYSTEM <span style="color:var(--accent)">v5.35</span></h2>
    
    <div class="admin-sidebar-btn" onclick="window.location.href='admin.html'">
        🛡️ PANEL DYREKCJI / USUWANIE
    </div>

    <div class="sor-stats">
        <div class="stat-badge">
            <span class="stat-val" id="count_active" style="color: var(--accent);">0</span>
            <span class="stat-lbl">Oczekujący</span>
        </div>
        <div class="stat-badge" style="border-color: var(--red);">
            <span class="stat-val" id="count_critical" style="color: var(--red);">0</span>
            <span class="stat-lbl">Krytyczni</span>
        </div>
    </div>

    <div style="display: flex; gap: 5px; margin-bottom: 15px;">
        <button id="btn_view_active" style="flex:1; background:var(--accent); color:black;" onclick="setView('active')">AKTYWNI</button>
        <button id="btn_view_arch" style="flex:1; background:#333; color:white;" onclick="setView('archive')">ARCHIWUM</button>
    </div>
    
    <span class="label" style="margin-bottom: 5px;">Rejestracja Nowa</span>
    <input type="text" id="add_name" placeholder="IMIĘ I NAZWISKO">
    <button style="background:var(--accent); color:black; width:100%;" onclick="nowyPacjent()">REJESTRUJ PACJENTA</button>
    
    <div id="lista_pacjentow"></div>
</div>

<div id="main">
    <div id="interface" class="hidden">
        <div id="header-fixed">
            <div style="padding: 15px 25px; display: flex; justify-content: space-between; align-items: center;">
                <h1 id="disp_name" style="margin: 0; color: white; font-size: 24px; font-weight: 900;"></h1>
                <div id="cert-status-header" class="cert-box" style="margin:0; font-size:11px; min-width: 180px;">BRAK BADAŃ</div>
            </div>
            <div class="tabs-nav">
                <div class="tab-btn active" onclick="switchTab('tab-ogolne', this)">DASHBOARD</div>
                <div class="tab-btn" onclick="switchTab('tab-med', this)">KLINIKA & KALKULATORY</div>
                <div class="tab-btn" onclick="switchTab('tab-psych', this)" style="color:var(--psych);">🧠 ZDR. BEHAWIORALNE</div>
                <div class="tab-btn" onclick="switchTab('tab-cert', this)" style="color:var(--cert);">📋 ORZECZNICTWO</div>
                <div class="tab-btn" onclick="switchTab('tab-docs', this)" style="color:var(--docs);">📁 DOKUMENTACJA</div>
                <div class="tab-btn" onclick="switchTab('tab-exit', this)" style="color:var(--discharge);">🚪 WYPIS</div>
            </div>
        </div>

        <div id="content-area">
            <div id="tab-ogolne" class="tab-content">
                <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 20px;">
                    <div class="card" id="main-data-card" style="border-top: 5px solid var(--accent);">
                        <span class="label">Dane Pacjenta</span>
                        <div class="grid"><input type="text" id="inp_adr" placeholder="Adres"><input type="text" id="inp_job" placeholder="Zawód"></div>
                        <div class="grid">
                            <input type="text" id="inp_ins" placeholder="Ubezpieczenie">
                            <select id="inp_blood">
                                <option>Grupa Krwi: Nieznana</option>
                                <option>0 Rh+</option><option>0 Rh-</option><option>A Rh+</option><option>A Rh-</option><option>B Rh+</option><option>B Rh-</option><option>AB Rh+</option><option>AB Rh-</option>
                            </select>
                        </div>
                        <span class="label" style="color:var(--red)">⚠️ Alergie</span>
                        <input type="text" id="inp_alergie" style="border-color:var(--red)">
                        <span class="label">Powód Przyjęcia</span>
                        <textarea id="inp_reason" rows="3"></textarea>
                    </div>
                    <div class="card" style="background:#14171a;">
                        <span class="label">Triage & Stan</span>
                        <select id="inp_triage" onchange="updateTriageVisuals()"><option value="none">STANDARD</option><option value="t-green">ZIELONY</option><option value="t-yellow">ŻÓŁTY</option><option value="t-red">CZERWONY</option></select>
                        <select id="inp_status"><option>Stabilny</option><option>Ciężki</option><option>Krytyczny</option><option>Zgon</option></select>
                        <hr style="border:0; border-top:1px solid #333; margin:15px 0;">
                        <button class="med-action-btn" onclick="addNote('ALARM: STEMI!')">STEMI</button>
                        <button class="med-action-btn" onclick="addNote('ALARM: UDAR!')">UDAR</button>
                    </div>
                </div>
            </div>

            <div id="tab-med" class="tab-content hidden">
                 <div class="card">Sekcja Kalkulatorów i Leków (v5.35)</div>
            </div>

            <div class="card" style="border-top: 5px solid var(--green); position: sticky; top: 0; z-index: 50; box-shadow: 0 10px 30px rgba(0,0,0,0.8);">
                <span class="label">Wpis do karty</span>
                <textarea id="inp_note" rows="3" placeholder="Wpisz treść wpisu..."></textarea>
                <div class="grid">
                    <input type="text" id="inp_doc" placeholder="Podpis">
                    <select id="inp_rank">
                        <option>Student Medycyny</option>
                        <option>Ratownik Medyczny</option>
                        <option>Lekarz Specjalista</option>
                        <option>Ordynator</option>
                        <option>Dyrektor Szpitala</option>
                    </select>
                </div>
                <button style="background:var(--green); color:white; width:100%; margin-top:10px;" onclick="zapiszWpis()">ZATWIERDŹ I DOPISZ DO HISTORII</button>
            </div>
            <div id="historia_kontener"></div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
    // Skrypt Firebase i logiki (taki sam jak poprzednio)
    const firebaseConfig = {
        apiKey: "AIzaSyC5MioZo7CMVGopaZANfglS12Gy_TMPzEw",
        authDomain: "baza-danych-cd445.firebaseapp.com",
        databaseURL: "https://baza-danych-cd445-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "baza-danych-cd445",
        storageBucket: "baza-danych-cd445.firebasestorage.app",
        messagingSenderId: "234044597162",
        appId: "1:234044597162:web:f46e383b858a363aea01d3"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let pacjenci = [];
    let aktywIdx = -1;
    let currentView = 'active';

    db.ref('pacjenci').on('value', (snapshot) => {
        const data = snapshot.val();
        pacjenci = data ? (Array.isArray(data) ? data : Object.values(data)) : [];
        updateStats();
        renderLista();
        if(aktywIdx !== -1) odswiezDanePacjenta();
    });

    function synchronizuj() { db.ref('pacjenci').set(pacjenci.filter(p => p !== null)); }

    function updateStats() {
        document.getElementById('count_active').innerText = pacjenci.filter(p => p && !p.arch).length;
        document.getElementById('count_critical').innerText = pacjenci.filter(p => p && !p.arch && (p.status === "Krytyczny" || p.triage === "t-red")).length;
    }

    function nowyPacjent() {
        let n = document.getElementById('add_name').value.trim();
        if(!n) return;
        pacjenci.push({ name: n, status: "Stabilny", triage: "none", arch: false, history: [{doc: "SYSTEM", txt: "Rejestracja", time: new Date().toLocaleString(), rank: "Automatyczny"}] });
        document.getElementById('add_name').value = "";
        synchronizuj();
    }

    function renderLista() {
        let l = document.getElementById('lista_pacjentow'); l.innerHTML = "";
        pacjenci.forEach((p, i) => {
            if(!p) return;
            if((currentView === 'active' && !p.arch) || (currentView === 'archive' && p.arch)) {
                let d = document.createElement('div');
                d.className = `p-item ${aktywIdx === i ? 'active' : ''}`;
                d.innerHTML = `<b>${p.name}</b><br><small>${p.status}</small>`;
                d.onclick = () => { aktywIdx = i; document.getElementById('interface').classList.remove('hidden'); renderLista(); odswiezDanePacjenta(); };
                l.appendChild(d);
            }
        });
    }

    function odswiezDanePacjenta() {
        let p = pacjenci[aktywIdx];
        document.getElementById('disp_name').innerText = p.name;
        document.getElementById('inp_status').value = p.status;
        document.getElementById('inp_triage').value = p.triage;
        pokazHistorie();
    }

    function pokazHistorie() {
        let c = document.getElementById('historia_kontener'), p = pacjenci[aktywIdx];
        c.innerHTML = "<h3>HISTORIA MEDYCZNA</h3>";
        if(!p.history) return;
        p.history.slice().reverse().forEach(h => {
            let div = document.createElement('div');
            div.className = "history-item";
            div.innerHTML = `<small>${h.time}</small><p>${h.txt}</p><b>${h.doc}</b> (${h.rank})`;
            c.appendChild(div);
        });
    }

    function switchTab(id, b) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(id).classList.remove('hidden');
        b.classList.add('active');
    }

    function zapiszWpis() {
        let p = pacjenci[aktywIdx];
        let txt = document.getElementById('inp_note').value;
        let doc = document.getElementById('inp_doc').value;
        if(!doc || !txt) return;
        p.history.push({ txt: txt, doc: doc, time: new Date().toLocaleString(), rank: document.getElementById('inp_rank').value });
        p.status = document.getElementById('inp_status').value;
        p.triage = document.getElementById('inp_triage').value;
        document.getElementById('inp_note').value = "";
        synchronizuj();
    }
    
    function setView(v) { currentView = v; renderLista(); }
</script>
</body>
</html>
