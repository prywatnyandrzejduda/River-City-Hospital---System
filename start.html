<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hospital System - Start</title>
    <style>
        :root {
            --bg: #0b0d11;
            --panel: #141922;
            --card: #1b222d;
            --line: #2d3746;
            --text: #e8edf5;
            --muted: #8f9bab;
            --accent: #00d2d3;
            --ok: #2ecc71;
            --warn: #f1c40f;
            --err: #ff4757;
        }
        * { box-sizing: border-box; font-family: Consolas, "Courier New", monospace; }
        body { margin: 0; background: var(--bg); color: var(--text); }
        .wrap { max-width: 1300px; margin: 0 auto; padding: 20px; }
        h1 { margin: 0 0 6px 0; }
        .sub { color: var(--muted); margin-bottom: 16px; font-size: 13px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 16px;
        }
        h2 { margin: 0 0 10px 0; color: var(--accent); font-size: 18px; }
        h3 { margin: 14px 0 8px 0; color: #9ddfe0; font-size: 14px; }
        input, select, button {
            width: 100%;
            margin-bottom: 8px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #111722;
            color: var(--text);
            padding: 10px;
        }
        button { cursor: pointer; font-weight: 700; text-transform: uppercase; }
        .btn { background: var(--accent); color: #042022; border-color: #00b9bb; }
        .btn2 { background: #1f2a37; }
        .msg { min-height: 18px; font-size: 12px; color: var(--muted); }
        .ok { color: var(--ok); }
        .err { color: var(--err); }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .line { border-top: 1px solid var(--line); margin: 10px 0; }
        .badge { display: inline-block; border: 1px solid var(--line); border-radius: 8px; padding: 2px 6px; font-size: 11px; color: var(--warn); }
        @media (max-width: 980px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="wrap">
        <h1>HOSPITAL ACCESS GATEWAY</h1>
        <div class="sub">Logowanie lekarza i rejestracja/logowanie pacjenta. Dane synchronizowane przez `localStorage`.</div>
        <div class="grid">
            <div class="card">
                <h2>DOCTOR</h2>
                <div class="badge">Kod musi istnieć w `hospital_staff`</div>
                <h3>Logowanie</h3>
                <input id="doc_code" type="text" placeholder="Kod personelu (np. DR-2A91)" />
                <button class="btn" onclick="doctorLogin()">WEJDŹ DO PANELU LEKARZA</button>
                <div id="doc_msg" class="msg"></div>
                <button class="btn2" onclick="goToAdmin()">PRZEJDŹ DO ADMINA</button>
            </div>
            <div class="card">
                <h2>PATIENT</h2>
                <h3>Logowanie</h3>
                <input id="pat_login" type="text" placeholder="Login pacjenta (np. PT-01AF)" />
                <input id="pat_pass" type="password" placeholder="Hasło pacjenta" />
                <button class="btn" onclick="patientLogin()">WEJDŹ DO PORTALU PACJENTA</button>
                <div id="pat_msg" class="msg"></div>
                <div class="line"></div>
                <h3>Rejestracja pacjenta</h3>
                <input id="reg_name" type="text" placeholder="Imię i nazwisko" />
                <div class="row">
                    <input id="reg_age" type="number" min="1" max="120" placeholder="Wiek" />
                    <select id="reg_gender">
                        <option value="K">Płeć: K</option>
                        <option value="M">Płeć: M</option>
                    </select>
                </div>
                <input id="reg_address" type="text" placeholder="Miejsce zamieszkania" />
                <input id="reg_job" type="text" placeholder="Zawód" />
                <select id="reg_ins_yes" onchange="toggleInsuranceNo()">
                    <option value="TAK">Ubezpieczenie: TAK</option>
                    <option value="NIE">Ubezpieczenie: NIE</option>
                </select>
                <input id="reg_ins_num" type="text" placeholder="Nr ubezpieczenia (jeśli jest)" />
                <input id="reg_blood" type="text" placeholder="Grupa krwi (opcjonalnie)" />
                <input id="reg_pass" type="password" placeholder="Ustaw hasło do portalu" />
                <button class="btn2" onclick="registerPatient()">ZAREJESTRUJ PACJENTA</button>
                <div id="reg_msg" class="msg"></div>
            </div>
        </div>
    </div>
    <script>
        function readLS(key, fallback) {
            try { return JSON.parse(localStorage.getItem(key)) ?? fallback; } catch { return fallback; }
        }
        function writeLS(key, value) {
            localStorage.setItem(key, JSON.stringify(value));
        }
        function uid(prefix) {
            return prefix + "-" + Date.now().toString(36).toUpperCase() + "-" + Math.floor(Math.random() * 9999).toString().padStart(4, "0");
        }
        function logSystem(type, action, details) {
            const logs = readLS("system_logs", []);
            logs.push({ id: uid("LOG"), ts: Date.now(), type, action, details: details || {} });
            writeLS("system_logs", logs.slice(-800));
        }
        function ensureSeeds() {
            if (!Array.isArray(readLS("hospital_staff", null))) writeLS("hospital_staff", []);
            if (!Array.isArray(readLS("registered_patients", null))) writeLS("registered_patients", []);
            if (!Array.isArray(readLS("consultations", null))) writeLS("consultations", []);
        }
        ensureSeeds();
        function toggleInsuranceNo() {
            const has = document.getElementById("reg_ins_yes").value === "TAK";
            const inp = document.getElementById("reg_ins_num");
            inp.disabled = !has;
            if (!has) inp.value = "";
        }
        function doctorLogin() {
            const code = document.getElementById("doc_code").value.trim();
            const staff = readLS("hospital_staff", []);
            const msg = document.getElementById("doc_msg");
            const doctor = staff.find(s => s.code === code);
            if (!doctor) {
                msg.className = "msg err";
                msg.textContent = "Kod nie istnieje. Poproś admina o wygenerowanie kodu.";
                logSystem("doctor", "LOGIN_FAIL", { code });
                return;
            }
            writeLS("current_doctor_session", { doctorId: doctor.id, code: doctor.code, ts: Date.now() });
            logSystem("doctor", "LOGIN_SUCCESS", { doctorId: doctor.id, name: doctor.name, code: doctor.code });
            msg.className = "msg ok";
            msg.textContent = "Autoryzacja OK. Przekierowanie...";
            setTimeout(() => location.href = "doctor_panel.html", 250);
        }
        function registerPatient() {
            const name = document.getElementById("reg_name").value.trim();
            const age = Number(document.getElementById("reg_age").value || 0);
            const gender = document.getElementById("reg_gender").value;
            const address = document.getElementById("reg_address").value.trim();
            const job = document.getElementById("reg_job").value.trim();
            const insured = document.getElementById("reg_ins_yes").value;
            const insNumber = document.getElementById("reg_ins_num").value.trim();
            const blood = document.getElementById("reg_blood").value.trim();
            const pass = document.getElementById("reg_pass").value;
            const msg = document.getElementById("reg_msg");
            if (!name || !address || !job || !pass || age < 1) {
                msg.className = "msg err";
                msg.textContent = "Uzupełnij wszystkie wymagane pola.";
                return;
            }
            if (insured === "TAK" && !insNumber) {
                msg.className = "msg err";
                msg.textContent = "Podaj numer ubezpieczenia.";
                return;
            }
            const patients = readLS("registered_patients", []);
            const patientId = uid("PAT");
            const login = "PT-" + Math.random().toString(36).slice(2, 6).toUpperCase();
            const record = {
                id: patientId,
                login,
                password: pass,
                name,
                age,
                gender,
                address,
                job,
                insured,
                insNumber: insured === "TAK" ? insNumber : "",
                blood: blood || "",
                appointments: [],
                createdAt: Date.now()
            };
            patients.push(record);
            writeLS("registered_patients", patients);
            writeLS("current_patient_session", { patientId, login, ts: Date.now() });
            logSystem("patient", "REGISTER_SUCCESS", { patientId, login, name });
            msg.className = "msg ok";
            msg.innerHTML = "Rejestracja OK. Twój login: <b>" + login + "</b>. Zapisz go.";
            setTimeout(() => location.href = "patient_portal.html", 400);
        }
        function patientLogin() {
            const login = document.getElementById("pat_login").value.trim();
            const pass = document.getElementById("pat_pass").value;
            const patients = readLS("registered_patients", []);
            const msg = document.getElementById("pat_msg");
            const patient = patients.find(p => p.login === login && p.password === pass);
            if (!patient) {
                msg.className = "msg err";
                msg.textContent = "Błędny login lub hasło.";
                logSystem("patient", "LOGIN_FAIL", { login });
                return;
            }
            writeLS("current_patient_session", { patientId: patient.id, login: patient.login, ts: Date.now() });
            logSystem("patient", "LOGIN_SUCCESS", { patientId: patient.id, login: patient.login, name: patient.name });
            msg.className = "msg ok";
            msg.textContent = "Autoryzacja OK. Przekierowanie...";
            setTimeout(() => location.href = "patient_portal.html", 250);
        }
        function goToAdmin() {
            location.href = "admin.html";
        }
    </script>
</body>
</html>
