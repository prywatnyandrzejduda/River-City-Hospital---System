<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hospital System - Start</title>
    <style>
        :root {
            --bg: #0b0d11;
            --panel: #141922;
            --card: #1b222d;
            --line: #2d3746;
            --text: #e8edf5;
            --muted: #8f9bab;
            --accent: #00d2d3;
            --ok: #2ecc71;
            --warn: #f1c40f;
            --err: #ff4757;
        }
        * { box-sizing: border-box; font-family: Consolas, "Courier New", monospace; }
        body { margin: 0; background: var(--bg); color: var(--text); }
        .wrap { max-width: 1300px; margin: 0 auto; padding: 20px; }
        h1 { margin: 0 0 6px 0; }
        .sub { color: var(--muted); margin-bottom: 16px; font-size: 13px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 16px;
        }
        h2 { margin: 0 0 10px 0; color: var(--accent); font-size: 18px; }
        h3 { margin: 14px 0 8px 0; color: #9ddfe0; font-size: 14px; }
        input, select, button {
            width: 100%;
            margin-bottom: 8px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #111722;
            color: var(--text);
            padding: 10px;
        }
        button { cursor: pointer; font-weight: 700; text-transform: uppercase; }
        .btn { background: var(--accent); color: #042022; border-color: #00b9bb; }
        .btn2 { background: #1f2a37; }
        .msg { min-height: 18px; font-size: 12px; color: var(--muted); }
        .ok { color: var(--ok); }
        .err { color: var(--err); }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .line { border-top: 1px solid var(--line); margin: 10px 0; }
        .badge { display: inline-block; border: 1px solid var(--line); border-radius: 8px; padding: 2px 6px; font-size: 11px; color: var(--warn); }
        @media (max-width: 980px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="wrap">
        <h1>HOSPITAL ACCESS GATEWAY</h1>
        <div class="sub">Logowanie lekarza i rejestracja/logowanie pacjenta. Dane synchronizowane przez `localStorage`.</div>
        <div class="grid">
            <div class="card">
                <h2>DOCTOR</h2>
                <div class="badge">Rejestracja tylko kodem z `pending_codes`</div>
                <h3>Rejestracja lekarza</h3>
                <div class="row">
                    <input id="doc_first" type="text" placeholder="Imię" />
                    <input id="doc_last" type="text" placeholder="Nazwisko" />
                </div>
                <input id="doc_reg_pass" type="password" placeholder="Własne hasło" />
                <input id="doc_admin_code" type="text" placeholder="Kod od admina (DR-XXXX)" />
                <button class="btn2" onclick="doctorRegister()">ZAREJESTRUJ LEKARZA</button>
                <h3>Logowanie</h3>
                <input id="doc_code" type="text" placeholder="Kod personelu (np. DR-2A91)" />
                <input id="doc_pass" type="password" placeholder="Hasło lekarza" />
                <button class="btn" onclick="doctorLogin()">WEJDŹ DO PANELU LEKARZA</button>
                <div id="doc_msg" class="msg"></div>
                <button class="btn2" onclick="goToAdmin()">PRZEJDŹ DO ADMINA</button>
            </div>
            <div class="card">
                <h2>PATIENT</h2>
                <div class="badge">Rejestracja pacjenta w `patient_portal.html`</div>
                <h3>Logowanie</h3>
                <input id="pat_login" type="text" placeholder="Login pacjenta (np. PT-01AF)" />
                <input id="pat_pass" type="password" placeholder="Hasło pacjenta" />
                <button class="btn" onclick="patientLogin()">WEJDŹ DO PORTALU PACJENTA</button>
                <div id="pat_msg" class="msg"></div>
                <div class="line"></div>
                <button class="btn2" onclick="location.href='patient_portal.html'">REJESTRACJA PACJENTA</button>
            </div>
        </div>
    </div>
    <script>
        function readLS(key, fallback) {
            try { return JSON.parse(localStorage.getItem(key)) ?? fallback; } catch { return fallback; }
        }
        function writeLS(key, value) {
            localStorage.setItem(key, JSON.stringify(value));
        }
        function uid(prefix) {
            return prefix + "-" + Date.now().toString(36).toUpperCase() + "-" + Math.floor(Math.random() * 9999).toString().padStart(4, "0");
        }
        function logSystem(type, action, details) {
            const logs = readLS("system_logs", []);
            logs.push({ id: uid("LOG"), ts: Date.now(), type, action, details: details || {} });
            writeLS("system_logs", logs.slice(-800));
        }
        function ensureSeeds() {
            if (!Array.isArray(readLS("hospital_staff", null))) writeLS("hospital_staff", []);
            if (!Array.isArray(readLS("registered_patients", null))) writeLS("registered_patients", []);
            if (!Array.isArray(readLS("consultations", null))) writeLS("consultations", []);
            if (!Array.isArray(readLS("pending_codes", null))) writeLS("pending_codes", []);
        }
        ensureSeeds();
        function consumePendingCode(rawCode, type) {
            const code = String(rawCode || "").trim().toUpperCase();
            const pending = readLS("pending_codes", []);
            const idx = pending.findIndex(p => p.code === code && p.type === type);
            if (idx < 0) return null;
            const token = pending[idx];
            pending.splice(idx, 1);
            writeLS("pending_codes", pending);
            return token;
        }
        function doctorRegister() {
            const first = document.getElementById("doc_first").value.trim();
            const last = document.getElementById("doc_last").value.trim();
            const password = document.getElementById("doc_reg_pass").value;
            const adminCode = document.getElementById("doc_admin_code").value.trim().toUpperCase();
            const msg = document.getElementById("doc_msg");
            if (!first || !last || !password || !adminCode) {
                msg.className = "msg err";
                msg.textContent = "Uzupełnij dane lekarza i kod od admina.";
                return;
            }
            const token = consumePendingCode(adminCode, "doctor");
            if (!token) {
                msg.className = "msg err";
                msg.textContent = "Nieprawidłowy lub wykorzystany kod admina.";
                logSystem("doctor", "REGISTER_FAIL_CODE", { code: adminCode });
                return;
            }
            const staff = readLS("hospital_staff", []);
            if (staff.some(s => s.code === adminCode)) {
                msg.className = "msg err";
                msg.textContent = "Ten kod jest już przypisany.";
                return;
            }
            const entry = {
                id: uid("DOC"),
                code: adminCode,
                password,
                firstName: first,
                lastName: last,
                name: first + " " + last,
                rank: token.rank || "Rezydent",
                specialization: token.specialization || "Ogólna",
                createdAt: Date.now()
            };
            staff.push(entry);
            writeLS("hospital_staff", staff);
            logSystem("doctor", "REGISTER_SUCCESS", { doctorId: entry.id, code: entry.code, name: entry.name });
            msg.className = "msg ok";
            msg.textContent = "Rejestracja lekarza zakończona. Możesz się zalogować.";
            document.getElementById("doc_first").value = "";
            document.getElementById("doc_last").value = "";
            document.getElementById("doc_reg_pass").value = "";
            document.getElementById("doc_admin_code").value = "";
        }
        function doctorLogin() {
            const code = document.getElementById("doc_code").value.trim().toUpperCase();
            const password = document.getElementById("doc_pass").value;
            const staff = readLS("hospital_staff", []);
            const msg = document.getElementById("doc_msg");
            const doctor = staff.find(s => s.code === code && s.password === password);
            if (!doctor) {
                msg.className = "msg err";
                msg.textContent = "Błędny login (kod) lub hasło.";
                logSystem("doctor", "LOGIN_FAIL", { code });
                return;
            }
            writeLS("current_doctor_session", { doctorId: doctor.id, code: doctor.code, ts: Date.now() });
            logSystem("doctor", "LOGIN_SUCCESS", { doctorId: doctor.id, name: doctor.name, code: doctor.code });
            msg.className = "msg ok";
            msg.textContent = "Autoryzacja OK. Przekierowanie...";
            setTimeout(() => location.href = "doctor_panel.html", 250);
        }
        function patientLogin() {
            const login = document.getElementById("pat_login").value.trim().toUpperCase();
            const pass = document.getElementById("pat_pass").value;
            const patients = readLS("registered_patients", []);
            const msg = document.getElementById("pat_msg");
            const patient = patients.find(p => String(p.login).toUpperCase() === login && p.password === pass);
            if (!patient) {
                msg.className = "msg err";
                msg.textContent = "Błędny login lub hasło.";
                logSystem("patient", "LOGIN_FAIL", { login });
                return;
            }
            writeLS("current_patient_session", { patientId: patient.id, login: patient.login, ts: Date.now() });
            logSystem("patient", "LOGIN_SUCCESS", { patientId: patient.id, login: patient.login, name: patient.name });
            msg.className = "msg ok";
            msg.textContent = "Autoryzacja OK. Przekierowanie...";
            setTimeout(() => location.href = "patient_portal.html", 250);
        }
        function goToAdmin() {
            location.href = "admin.html";
        }
    </script>
</body>
</html>
