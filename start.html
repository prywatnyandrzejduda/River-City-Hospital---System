<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hospital System - Start</title>
    <style>
        :root {
            --bg0: #05070b;
            --bg1: #0a111b;
            --glass: rgba(255, 255, 255, 0.05);
            --line: rgba(255, 255, 255, 0.12);
            --text: #e8eff8;
            --muted: #93a0b4;
            --doc: #33c7ff;
            --pat: #37ff94;
            --admin: #f1c40f;
        }
        * { box-sizing: border-box; font-family: Consolas, "Courier New", monospace; }
        body {
            margin: 0;
            color: var(--text);
            background: radial-gradient(circle at 10% 10%, #0e1625, transparent 45%),
                        radial-gradient(circle at 90% 15%, #1a1226, transparent 45%),
                        linear-gradient(135deg, var(--bg0), var(--bg1));
        }
        .wrap { max-width: 1200px; margin: 0 auto; padding: 24px; min-height: 100vh; }
        .hero { margin-bottom: 16px; }
        .sub { color: var(--muted); font-size: 13px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 16px;
        }
        h2 { margin: 0 0 8px 0; }
        .doctor h2 { color: var(--doc); }
        .patient h2 { color: var(--pat); }
        .badge { color: #9fb0ca; font-size: 12px; margin-bottom: 8px; display: block; }
        input, button {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--line);
            background: rgba(10, 20, 35, 0.7);
            color: var(--text);
            margin-bottom: 8px;
        }
        button { cursor: pointer; font-weight: 700; text-transform: uppercase; transition: .2s ease; }
        .btn-doc { border-color: rgba(51,199,255,.55); color: #d8f6ff; }
        .btn-doc:hover { box-shadow: 0 0 16px rgba(51,199,255,.45); }
        .btn-pat { border-color: rgba(55,255,148,.5); color: #d9ffe9; }
        .btn-pat:hover { box-shadow: 0 0 16px rgba(55,255,148,.4); }
        .btn-admin { border-color: rgba(241,196,15,.6); color: #fff1b5; }
        .btn-admin:hover { box-shadow: 0 0 16px rgba(241,196,15,.45); }
        .msg { min-height: 16px; font-size: 12px; color: var(--muted); }
        .ok { color: #64ffa8; } .err { color: #ff6b78; }
        @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="hero">
            <h1>HOSPITAL ACCESS GATEWAY</h1>
            <div class="sub">Dostęp do paneli lekarza, pacjenta i administracji. Rejestracja tylko kodami jednorazowymi od Admina.</div>
        </div>
        <div class="grid">
            <div class="card doctor">
                <h2>LEKARZ</h2>
                <span class="badge">Rejestracja wymaga kodu `DR-XXXX` z `pending_codes`.</span>
                <input id="doc_first" type="text" placeholder="Imię" />
                <input id="doc_last" type="text" placeholder="Nazwisko" />
                <input id="doc_reg_pass" type="password" placeholder="Własne hasło" />
                <input id="doc_admin_code" type="text" placeholder="Kod od admina (DR-XXXX)" />
                <button class="btn-doc" onclick="doctorRegister()">ZAREJESTRUJ LEKARZA</button>
                <input id="doc_code" type="text" placeholder="Kod personelu" />
                <input id="doc_pass" type="password" placeholder="Hasło lekarza" />
                <button class="btn-doc" onclick="doctorLogin()">WEJDŹ DO PANELU LEKARZA</button>
                <div id="doc_msg" class="msg"></div>
                <button class="btn-admin" onclick="location.href='admin.html'">PANEL ADMINA</button>
            </div>
            <div class="card patient">
                <h2>PACJENT</h2>
                <span class="badge">Rejestracja wymaga kodu `PT-XXXX` w portalu pacjenta.</span>
                <input id="pat_login" type="text" placeholder="Login pacjenta (PT-XXXX)" />
                <input id="pat_pass" type="password" placeholder="Hasło pacjenta" />
                <button class="btn-pat" onclick="patientLogin()">WEJDŹ DO PORTALU PACJENTA</button>
                <div id="pat_msg" class="msg"></div>
                <button class="btn-pat" onclick="location.href='patient_portal.html'">REJESTRACJA PACJENTA</button>
                <button class="btn-doc" onclick="location.href='index.html'">ODDZIAŁ / KARTOTEKA</button>
            </div>
        </div>
    </div>
    <script>
        function readLS(key, fallback) { try { return JSON.parse(localStorage.getItem(key)) ?? fallback; } catch { return fallback; } }
        function writeLS(key, value) { localStorage.setItem(key, JSON.stringify(value)); }
        function uid(prefix) { return prefix + "-" + Date.now().toString(36).toUpperCase() + "-" + Math.floor(Math.random() * 9999).toString().padStart(4, "0"); }
        function logSystem(type, action, details) {
            const logs = readLS("system_logs", []);
            logs.push({ id: uid("LOG"), ts: Date.now(), type, action, details: details || {} });
            writeLS("system_logs", logs.slice(-800));
        }
        function ensureSeeds() {
            if (!Array.isArray(readLS("hospital_staff", null))) writeLS("hospital_staff", []);
            if (!Array.isArray(readLS("registered_patients", null))) writeLS("registered_patients", []);
            if (!Array.isArray(readLS("consultations", null))) writeLS("consultations", []);
            if (!Array.isArray(readLS("pending_codes", null))) writeLS("pending_codes", []);
            if (!Array.isArray(readLS("hosp_v545", null))) writeLS("hosp_v545", []);
        }
        function consumePendingCode(rawCode, type) {
            const code = String(rawCode || "").trim().toUpperCase();
            const pending = readLS("pending_codes", []);
            const idx = pending.findIndex(p => p.code === code && p.type === type);
            if (idx < 0) return null;
            const token = pending[idx];
            pending.splice(idx, 1);
            writeLS("pending_codes", pending);
            return token;
        }
        ensureSeeds();
        function doctorRegister() {
            const first = document.getElementById("doc_first").value.trim();
            const last = document.getElementById("doc_last").value.trim();
            const password = document.getElementById("doc_reg_pass").value;
            const adminCode = document.getElementById("doc_admin_code").value.trim().toUpperCase();
            const msg = document.getElementById("doc_msg");
            if (!first || !last || !password || !adminCode) {
                msg.className = "msg err"; msg.textContent = "Uzupełnij dane lekarza i kod od admina."; return;
            }
            const token = consumePendingCode(adminCode, "doctor");
            if (!token) { msg.className = "msg err"; msg.textContent = "Nieprawidłowy lub wykorzystany kod admina."; return; }
            const staff = readLS("hospital_staff", []);
            const entry = {
                id: uid("DOC"), code: adminCode, password, firstName: first, lastName: last, name: first + " " + last,
                rank: token.rank || "Rezydent", specialization: token.specialization || "Ogólna", createdAt: Date.now()
            };
            staff.push(entry);
            writeLS("hospital_staff", staff);
            logSystem("doctor", "REGISTER_SUCCESS", { doctorId: entry.id, code: entry.code });
            msg.className = "msg ok"; msg.textContent = "Rejestracja lekarza zakończona.";
            ["doc_first","doc_last","doc_reg_pass","doc_admin_code"].forEach(id => document.getElementById(id).value = "");
        }
        function doctorLogin() {
            const code = document.getElementById("doc_code").value.trim().toUpperCase();
            const password = document.getElementById("doc_pass").value;
            const doctor = readLS("hospital_staff", []).find(s => s.code === code && s.password === password);
            const msg = document.getElementById("doc_msg");
            if (!doctor) { msg.className = "msg err"; msg.textContent = "Błędny kod lub hasło."; return; }
            writeLS("current_doctor_session", { doctorId: doctor.id, code: doctor.code, ts: Date.now() });
            logSystem("doctor", "LOGIN_SUCCESS", { doctorId: doctor.id });
            msg.className = "msg ok"; msg.textContent = "Autoryzacja OK.";
            setTimeout(() => location.href = "doctor_panel.html", 200);
        }
        function patientLogin() {
            const login = document.getElementById("pat_login").value.trim().toUpperCase();
            const pass = document.getElementById("pat_pass").value;
            const patient = readLS("registered_patients", []).find(p => String(p.login).toUpperCase() === login && p.password === pass);
            const msg = document.getElementById("pat_msg");
            if (!patient) { msg.className = "msg err"; msg.textContent = "Błędny login lub hasło."; return; }
            writeLS("current_patient_session", { patientId: patient.id, login: patient.login, ts: Date.now() });
            logSystem("patient", "LOGIN_SUCCESS", { patientId: patient.id, login: patient.login });
            msg.className = "msg ok"; msg.textContent = "Autoryzacja OK.";
            setTimeout(() => location.href = "patient_portal.html", 200);
        }
    </script>
</body>
</html>
