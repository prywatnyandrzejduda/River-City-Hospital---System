<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hospital System - Start</title>
    <style>
        :root {
            --bg: #06080d;
            --panel: #141922;
            --card: rgba(255, 255, 255, 0.05);
            --line: rgba(255, 255, 255, 0.12);
            --text: #e8edf5;
            --muted: #8f9bab;
            --accent: #00d2d3;
            --doctor: #39a8ff;
            --patient: #2dff8d;
            --ok: #2ecc71;
            --warn: #f1c40f;
            --err: #ff4757;
        }
        * { box-sizing: border-box; font-family: Consolas, "Courier New", monospace; }
        body {
            margin: 0;
            background: radial-gradient(circle at 10% 10%, #101a2a 0%, #06080d 55%),
                        radial-gradient(circle at 90% 90%, #0f1f17 0%, #06080d 60%);
            color: var(--text);
            min-height: 100vh;
        }
        .wrap { max-width: 1300px; margin: 0 auto; padding: 20px; }
        h1 { margin: 0 0 6px 0; }
        .sub { color: var(--muted); margin-bottom: 16px; font-size: 13px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 16px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
        }
        .doctor-card { border-color: rgba(57, 168, 255, 0.35); }
        .patient-card { border-color: rgba(45, 255, 141, 0.35); }
        h2 { margin: 0 0 10px 0; color: var(--accent); font-size: 18px; }
        h3 { margin: 14px 0 8px 0; color: #9ddfe0; font-size: 14px; }
        input, select, button {
            width: 100%;
            margin-bottom: 8px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            background: rgba(255, 255, 255, 0.03);
            color: var(--text);
            border-radius: 8px;
            padding: 12px;
            font-weight: 600;
        }
        button {
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid var(--accent);
        }
        button:hover {
            background: var(--accent);
            color: #032022;
            transform: translateY(-1px);
            box-shadow: 0 5px 15px rgba(0, 210, 211, 0.3);
        }
        .btn-doctor { background: var(--doctor); color: #0a1929; }
        .btn-patient { background: var(--patient); color: #0a1929; }
        .msg {
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 8px;
        }
        .msg.ok { background: rgba(46, 204, 113, 0.15); color: var(--ok); border: 1px solid var(--ok); }
        .msg.err { background: rgba(255, 71, 87, 0.15); color: var(--err); border: 1px solid var(--err); }
        .admin-link {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--accent);
            color: #032022;
            padding: 8px 12px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 700;
            font-size: 11px;
            text-transform: uppercase;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <h1 style="text-align: center; color: var(--accent); font-size: 32px; margin-bottom: 30px;">
            🏥 HOSPITAL SYSTEM
        </h1>
        <div class="grid">
            <div class="card doctor-card">
                <h2>👨‍⚕️ LEKARZ</h2>
                <div class="sub">Logowanie personelu medycznego</div>
                <input type="text" id="doc_code" placeholder="Kod dostępu" maxlength="20" />
                <input type="password" id="doc_pass" placeholder="Hasło" />
                <button class="btn-doctor" onclick="doctorLogin()">ZALOGUJ SIĘ</button>
                <div id="doc_msg" class="msg"></div>
            </div>
            <div class="card patient-card">
                <h2>🧑 PACJENT</h2>
                <div class="sub">Logowanie pacjentów</div>
                <input type="text" id="pat_login" placeholder="Login" maxlength="20" />
                <input type="password" id="pat_pass" placeholder="Hasło" />
                <button class="btn-patient" onclick="patientLogin()">ZALOGUJ SIĘ</button>
                <div id="pat_msg" class="msg"></div>
            </div>
        </div>
    </div>
    <a href="admin.html" class="admin-link">⚙️ ADMIN</a>

    <script>
        function readLS(key, fallback) { try { return JSON.parse(localStorage.getItem(key)) ?? fallback; } catch { return fallback; } }
        function writeLS(key, value) { localStorage.setItem(key, JSON.stringify(value)); }
        function uid(prefix) { return prefix + "-" + Date.now().toString(36).toUpperCase() + "-" + Math.floor(Math.random() * 9999).toString().padStart(4, "0"); }
        function esc(s) { return String(s ?? "").replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#39;"); }
        function logSystem(type, action, details) {
            const logs = readLS("system_logs", []);
            logs.push({ id: uid("LOG"), ts: Date.now(), type, action, details: details || {} });
            writeLS("system_logs", logs.slice(-900));
        }

        function doctorLogin() {
            const code = document.getElementById("doc_code").value.trim().toUpperCase();
            const password = document.getElementById("doc_pass").value;
            const staff = readLS("hospital_staff", []);
            const msg = document.getElementById("doc_msg");
            const doctor = staff.find(s => s.code === code && s.password === password);

            if (!doctor) {
                msg.className = "msg err";
                msg.textContent = "Błędny login (kod) lub hasło.";
                logSystem("doctor", "LOGIN_FAIL", { code });
                return;
            }

            // Zapisz pełną sesję z obiektem lekarza
            const userObject = {
                id: doctor.id,
                name: doctor.name,
                rank: doctor.rank,
                specialization: doctor.specialization,
                code: doctor.code,
                loginTime: Date.now()
            };
            
            writeLS("activeSession", JSON.stringify(userObject));
            writeLS("current_doctor_session", { doctorId: doctor.id, code: doctor.code, ts: Date.now() });
            logSystem("doctor", "LOGIN_SUCCESS", { doctorId: doctor.id, name: doctor.name, code: doctor.code });
            msg.className = "msg ok";
            msg.textContent = "Autoryzacja OK. Przekierowanie...";
            setTimeout(() => location.href = "index.html", 250);
        }

        function patientLogin() {
            const login = document.getElementById("pat_login").value.trim().toUpperCase();
            const pass = document.getElementById("pat_pass").value;
            const patients = readLS("registered_patients", []);
            const msg = document.getElementById("pat_msg");
            const patient = patients.find(p => String(p.login).toUpperCase() === login && p.password === pass);

            if (!patient) {
                msg.className = "msg err";
                msg.textContent = "Błędny login lub hasło.";
                logSystem("patient", "LOGIN_FAIL", { login });
                return;
            }

            writeLS("current_patient_session", { patientId: patient.id, login: patient.login, ts: Date.now() });
            logSystem("patient", "LOGIN_SUCCESS", { patientId: patient.id, login: patient.login });
            msg.className = "msg ok";
            msg.textContent = "Autoryzacja OK. Przekierowanie...";
            setTimeout(() => location.href = "patient_portal_complete.html", 250);
        }

        // Inicjalizacja
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('doc_code').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') doctorLogin();
            });
            document.getElementById('doc_pass').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') doctorLogin();
            });
            document.getElementById('pat_login').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') patientLogin();
            });
            document.getElementById('pat_pass').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') patientLogin();
            });
        });
    </script>
</body>
</html>
