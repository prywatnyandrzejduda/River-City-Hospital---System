<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Patient Portal - Hospital System</title>
    <style>
        :root {
            --bg: #06080d; --panel: rgba(255,255,255,0.05); --card: rgba(255,255,255,0.05); --line: rgba(255,255,255,0.12);
            --text: #e9eef7; --muted: #94a0af; --accent: #2dff8d; --ok: #2ecc71; --err: #ff4757;
        }
        * { box-sizing: border-box; font-family: Consolas, "Courier New", monospace; }
        body {
            margin: 0;
            background: radial-gradient(circle at 10% 10%, #102319 0%, #06080d 55%),
                        radial-gradient(circle at 90% 90%, #12273a 0%, #06080d 60%);
            color: var(--text);
        }
        .hidden { display: none !important; }
        .wrap { max-width: 1400px; margin: 0 auto; padding: 16px; }
        .auth-wrap { min-height: 100vh; display: grid; place-items: center; padding: 16px; }
        .auth-grid { width: 100%; max-width: 1100px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card { background: var(--card); border: 1px solid var(--line); border-radius: 10px; padding: 14px; margin-bottom: 12px; backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); box-shadow: 0 10px 28px rgba(0,0,0,0.35); }
        h1, h2 { margin: 0 0 10px 0; } h2 { color: var(--accent); font-size: 16px; }
        .muted { color: var(--muted); font-size: 12px; margin-bottom: 10px; }
        input, select, textarea, button { width: 100%; border: 1px solid var(--line); background: rgba(11,16,24,0.8); color: var(--text); border-radius: 8px; padding: 10px; margin-bottom: 8px; }
        button { cursor: pointer; font-weight: 700; text-transform: uppercase; transition: 0.2s ease; }
        .btn { background: var(--accent); color: #032022; border-color: #00b8b9; }
        .btn2 { background: #202c3d; }
        .btn-danger { background: #34171e; border-color: #4c1f29; color: #ff9aa5; }
        .msg { font-size: 12px; min-height: 16px; color: var(--muted); }
        .ok { color: var(--ok); } .err { color: var(--err); }
        .topbar { display: flex; justify-content: space-between; gap: 8px; align-items: center; background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 12px; }
        .tabs { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }
        .tab-btn { border: 1px solid var(--line); background: #162132; color: var(--text); border-radius: 8px; padding: 9px 12px; cursor: pointer; font-weight: 700; }
        .tab-btn.active { border-color: var(--accent); color: var(--accent); }
        .tab { display: none; } .tab.active { display: block; }
        .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .history-item { border: 1px solid var(--line); border-radius: 8px; background: #0f1622; padding: 10px; margin-bottom: 8px; font-size: 12px; }
        .chat-box { border: 1px solid var(--line); border-radius: 8px; background: #0d141f; max-height: 330px; overflow: auto; padding: 8px; }
        .chat-line { border-bottom: 1px dashed #243247; padding: 6px 4px; font-size: 12px; }
        .me { color: #a9f3c7; } .other { color: #b5c6dd; }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(45, 255, 141, 0.2);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4),
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }
        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(45, 255, 141, 0.4), 
                transparent);
        }
        .glass-card h3 {
            color: var(--accent);
            margin: 0 0 16px 0;
            font-size: 18px;
            text-shadow: 0 0 10px rgba(45, 255, 141, 0.5);
        }
        .glass-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 12px;
        }
        .glass-field {
            display: flex;
            flex-direction: column;
        }
        .glass-label {
            color: var(--muted);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }
        .glass-value {
            color: var(--text);
            font-size: 14px;
            font-weight: 600;
        }
        .glass-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .status-stable {
            background: rgba(46, 204, 113, 0.2);
            color: var(--ok);
            border: 1px solid rgba(46, 204, 113, 0.4);
        }
        .status-critical {
            background: rgba(255, 71, 87, 0.2);
            color: var(--err);
            border: 1px solid rgba(255, 71, 87, 0.4);
        }
        .glass-history {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glass-history-item {
            background: rgba(0, 0, 0, 0.2);
            border-left: 3px solid var(--accent);
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 0 8px 8px 0;
            font-size: 12px;
        }
        .glass-history-date {
            color: var(--accent);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }
        button:hover { box-shadow: 0 0 18px rgba(45, 255, 141, 0.35); transform: translateY(-1px); }
        @media (max-width: 950px) { .auth-grid, .grid2 { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div id="authScreen" class="auth-wrap">
        <div class="auth-grid">
            <div class="card">
                <h2>Logowanie pacjenta</h2>
                <input id="auth_login" type="text" placeholder="Login pacjenta (PT-XXXX)" />
                <input id="auth_pass" type="password" placeholder="Hasło" />
                <button class="btn" onclick="authLogin()">ZALOGUJ</button>
                <button class="btn2" onclick="location.href='hospital_system.html'">POWRÓT DO START</button>
                <div id="auth_msg" class="msg"></div>
            </div>
            <div class="card">
                <h2>Rejestracja pacjenta</h2>
                <div class="muted">Wymagany jednorazowy kod od admina (`pending_codes`, typ `patient`).</div>
                <input id="r_code" type="text" placeholder="Kod od admina (PT-XXXX)" />
                <input id="r_name" type="text" placeholder="Imię i nazwisko" />
                <div class="grid2">
                    <input id="r_age" type="number" min="1" max="120" placeholder="Wiek" />
                    <select id="r_gender"><option value="K">Płeć: K</option><option value="M">Płeć: M</option></select>
                </div>
                <input id="r_address" type="text" placeholder="Miejsce zamieszkania" />
                <input id="r_job" type="text" placeholder="Zawód" />
                <select id="r_insured" onchange="toggleInsurance()"><option value="TAK">Ubezpieczenie: TAK</option><option value="NIE">Ubezpieczenie: NIE</option></select>
                <input id="r_ins_num" type="text" placeholder="Numer ubezpieczenia" />
                <input id="r_blood" type="text" placeholder="Grupa krwi (opcjonalnie)" />
                <input id="r_pass" type="password" placeholder="Własne hasło" />
                <button class="btn2" onclick="authRegister()">ZAREJESTRUJ PACJENTA</button>
                <div id="reg_msg" class="msg"></div>
            </div>
        </div>
    </div>

    <div id="portalScreen" class="wrap hidden">
        <div class="topbar">
            <h1>PATIENT PORTAL</h1>
            <div>
                <button class="btn2" onclick="logoutPatient()">WYLOGUJ</button>
            </div>
        </div>
        <div class="tabs">
            <button class="tab-btn active" onclick="setTab('p1', this)">Informacje o sobie</button>
            <button class="tab-btn" onclick="setTab('p2', this)">Moja Karta</button>
            <button class="tab-btn" onclick="setTab('p3', this)">Zapisy na badania</button>
            <button class="tab-btn" onclick="setTab('p4', this)">Konsultacje</button>
        </div>

        <div id="p1" class="tab active"><div class="card">
            <h2>Informacje o sobie</h2>
            <div class="muted">Login/ID domyślnie zablokowane. Zmiana tylko kodem BOSS123.</div>
            <div class="grid2">
                <div>
                    <input id="f_id" disabled />
                    <input id="f_login" disabled />
                    <input id="f_name" placeholder="Imię i nazwisko" />
                    <div class="grid2"><input id="f_age" type="number" placeholder="Wiek" /><select id="f_gender"><option value="K">K</option><option value="M">M</option></select></div>
                    <input id="f_address" placeholder="Miejsce zamieszkania" />
                    <input id="f_job" placeholder="Zawód" />
                </div>
                <div>
                    <select id="f_insured"><option value="TAK">Ubezpieczenie: TAK</option><option value="NIE">Ubezpieczenie: NIE</option></select>
                    <input id="f_insNum" placeholder="Nr ubezpieczenia" />
                    <input id="f_blood" placeholder="Grupa krwi (opcjonalnie)" />
                    <input id="f_pass" type="password" placeholder="Nowe hasło (opcjonalnie)" />
                    <button class="btn" onclick="saveProfile()">ZAPISZ DANE</button>
                    <div id="save_msg" class="msg"></div>
                    <input id="boss_code" type="password" placeholder="Kod admina do edycji ID/Loginu" />
                    <button class="btn-danger" onclick="unlockIdentity()">ODBLOKUJ EDYCJĘ ID/LOGIN</button>
                </div>
            </div>
        </div></div>
        <div id="p2" class="tab"><div class="card"><h2>Moja Karta</h2><div id="medical_history"></div></div></div>
        <div id="p3" class="tab"><div class="card">
            <h2>Zapisy na badania</h2>
            <div class="grid2">
                <div>
                    <select id="ap_type"><option>Psychologia</option><option>Chirurgia</option><option>Kardiologia</option><option>Radiologia</option><option>Medycyna ogólna</option></select>
                    <input id="ap_date" type="datetime-local" />
                    <textarea id="ap_note" rows="4" placeholder="Notatka..."></textarea>
                    <button class="btn" onclick="addAppointment()">ZAPISZ TERMIN</button>
                    <div id="ap_msg" class="msg"></div>
                </div>
                <div><div id="appointments_list"></div></div>
            </div>
        </div></div>
        <div id="p4" class="tab"><div class="card">
            <h2>Konsultacje</h2>
            <div class="grid2">
                <div><select id="consult_doctor"></select><div id="consult_meta" class="muted"></div><div id="chat_box" class="chat-box"></div></div>
                <div><textarea id="chat_text" rows="8" placeholder="Wiadomość do lekarza..."></textarea><button class="btn" onclick="sendMessage()">WYŚLIJ</button><button class="btn2" onclick="refreshChat()">ODŚWIEŻ</button></div>
            </div>
        </div></div>
    </div>

    <script>
        function readLS(key, fallback) { try { return JSON.parse(localStorage.getItem(key)) ?? fallback; } catch { return fallback; } }
        function writeLS(key, value) { localStorage.setItem(key, JSON.stringify(value)); }
        function uid(prefix) { return prefix + "-" + Date.now().toString(36).toUpperCase() + "-" + Math.floor(Math.random() * 9999).toString().padStart(4, "0"); }
        function esc(s) { return String(s ?? "").replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#39;"); }
        function logSystem(type, action, details) {
            const logs = readLS("system_logs", []);
            logs.push({ id: uid("LOG"), ts: Date.now(), type, action, details: details || {} });
            writeLS("system_logs", logs.slice(-900));
        }
        function ensureSeeds() {
            if (!Array.isArray(readLS("pending_codes", null))) writeLS("pending_codes", []);
            if (!Array.isArray(readLS("registered_patients", null))) writeLS("registered_patients", []);
            if (!Array.isArray(readLS("hospital_staff", null))) writeLS("hospital_staff", []);
            if (!Array.isArray(readLS("consultations", null))) writeLS("consultations", []);
            if (!Array.isArray(readLS("hosp_v545", null))) writeLS("hosp_v545", []);
        }
        ensureSeeds();

        let me = null;
        let identityUnlocked = false;

        function createDefaultHospRecord(patient) {
            return {
                patientLinkId: patient.id,
                name: patient.name || "",
                adr: patient.address || "",
                job: patient.job || "",
                ins: patient.insured === "TAK" ? (patient.insNumber || "TAK") : "NIE",
                blood: patient.blood || "Nieznana",
                alergie: "",
                reason: "",
                status: "Stabilny",
                triage: "none",
                cert: "BRAK",
                arch: false,
                history: []
            };
        }

        function syncPatientToHosp(patient) {
            const hosp = readLS("hosp_v545", []);
            if (!Array.isArray(hosp)) return;
            const byLink = hosp.findIndex(r => String(r.patientLinkId || "") === String(patient.id));
            const byName = hosp.findIndex(r => String(r.name || "").trim().toLowerCase() === String(patient.name || "").trim().toLowerCase());
            const idx = byLink >= 0 ? byLink : byName;

            if (idx >= 0) {
                const rec = hosp[idx];
                rec.patientLinkId = patient.id;
                rec.name = patient.name || rec.name || "";
                rec.adr = patient.address || "";
                rec.job = patient.job || "";
                rec.ins = patient.insured === "TAK" ? (patient.insNumber || "TAK") : "NIE";
                rec.blood = patient.blood || "Nieznana";
            } else {
                hosp.push(createDefaultHospRecord(patient));
            }
            writeLS("hosp_v545", hosp);
        }

        function toggleInsurance() {
            const has = document.getElementById("r_insured").value === "TAK";
            const i = document.getElementById("r_ins_num");
            i.disabled = !has;
            if (!has) i.value = "";
        }

        function consumePendingCode(rawCode, type) {
            const code = String(rawCode || "").trim().toUpperCase();
            const pending = readLS("pending_codes", []);
            const idx = pending.findIndex(p => p.code === code && p.type === type);
            if (idx < 0) return null;
            const token = pending[idx];
            pending.splice(idx, 1);
            writeLS("pending_codes", pending);
            return token;
        }

        function authLogin() {
            const login = document.getElementById("auth_login").value.trim().toUpperCase();
            const pass = document.getElementById("auth_pass").value;
            const msg = document.getElementById("auth_msg");
            const patients = readLS("registered_patients", []);
            const patient = patients.find(p => String(p.login).toUpperCase() === login && p.password === pass);

            if (!patient) {
                msg.className = "msg err";
                msg.textContent = "Błędny login lub hasło.";
                logSystem("patient", "LOGIN_FAIL", { login });
                return;
            }

            me = patient;
            writeLS("current_patient_session", { patientId: patient.id, login: patient.login, ts: Date.now() });
            logSystem("patient", "LOGIN_SUCCESS", { patientId: patient.id, login: patient.login });
            showPortal();
        }

        function authRegister() {
            const code = document.getElementById("r_code").value.trim().toUpperCase();
            const name = document.getElementById("r_name").value.trim();
            const age = parseInt(document.getElementById("r_age").value);
            const gender = document.getElementById("r_gender").value;
            const address = document.getElementById("r_address").value.trim();
            const job = document.getElementById("r_job").value.trim();
            const insured = document.getElementById("r_insured").value;
            const insNum = document.getElementById("r_ins_num").value.trim();
            const blood = document.getElementById("r_blood").value.trim();
            const pass = document.getElementById("r_pass").value;
            const msg = document.getElementById("reg_msg");

            if (!code || !name || !age || !address || !pass) {
                msg.className = "msg err";
                msg.textContent = "Uzupełnij wymagane pola.";
                return;
            }

            const token = consumePendingCode(code, "patient");
            if (!token) {
                msg.className = "msg err";
                msg.textContent = "Nieprawidłowy lub wykorzystany kod.";
                logSystem("patient", "REGISTER_FAIL_CODE", { code });
                return;
            }

            const patients = readLS("registered_patients", []);
            const patient = {
                id: uid("PT"),
                login: code,
                password: pass,
                name,
                age,
                gender,
                address,
                job,
                insured,
                insNumber: insured === "TAK" ? insNum : "",
                blood,
                createdAt: Date.now()
            };

            patients.push(patient);
            writeLS("registered_patients", patients);
            syncPatientToHosp(patient);
            logSystem("patient", "REGISTER_SUCCESS", { patientId: patient.id, login: patient.login });

            msg.className = "msg ok";
            msg.textContent = "Rejestracja zakończona. Możesz się zalogować.";
            document.getElementById("r_code").value = "";
            document.getElementById("r_name").value = "";
            document.getElementById("r_age").value = "";
            document.getElementById("r_address").value = "";
            document.getElementById("r_job").value = "";
            document.getElementById("r_ins_num").value = "";
            document.getElementById("r_blood").value = "";
            document.getElementById("r_pass").value = "";
        }

        function showPortal() {
            document.getElementById("authScreen").classList.add("hidden");
            document.getElementById("portalScreen").classList.remove("hidden");
            loadProfile();
            loadMedicalHistory();
            loadAppointments();
            loadDoctors();
        }

        function setTab(tabId, btn) {
            document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
            document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
            btn.classList.add("active");
            document.getElementById(tabId).classList.add("active");
        }

        function loadProfile() {
            if (!me) return;
            document.getElementById("f_id").value = me.id;
            document.getElementById("f_login").value = me.login;
            document.getElementById("f_name").value = me.name || "";
            document.getElementById("f_age").value = me.age || "";
            document.getElementById("f_gender").value = me.gender || "K";
            document.getElementById("f_address").value = me.address || "";
            document.getElementById("f_job").value = me.job || "";
            document.getElementById("f_insured").value = me.insured || "TAK";
            document.getElementById("f_insNum").value = me.insNumber || "";
            document.getElementById("f_blood").value = me.blood || "";
        }

        function saveProfile() {
            if (!me) return;
            const msg = document.getElementById("save_msg");
            
            me.name = document.getElementById("f_name").value.trim();
            me.age = parseInt(document.getElementById("f_age").value);
            me.gender = document.getElementById("f_gender").value;
            me.address = document.getElementById("f_address").value.trim();
            me.job = document.getElementById("f_job").value.trim();
            me.insured = document.getElementById("f_insured").value;
            me.insNumber = me.insured === "TAK" ? document.getElementById("f_insNum").value.trim() : "";
            me.blood = document.getElementById("f_blood").value.trim();
            
            const newPass = document.getElementById("f_pass").value;
            if (newPass) me.password = newPass;

            const patients = readLS("registered_patients", []);
            const idx = patients.findIndex(p => p.id === me.id);
            if (idx >= 0) {
                patients[idx] = me;
                writeLS("registered_patients", patients);
                syncPatientToHosp(me);
                logSystem("patient", "PROFILE_UPDATE", { patientId: me.id });
                msg.className = "msg ok";
                msg.textContent = "Dane zapisane.";
                document.getElementById("f_pass").value = "";
            }
        }

        function unlockIdentity() {
            const code = document.getElementById("boss_code").value;
            const msg = document.getElementById("save_msg");
            
            if (code !== "BOSS123") {
                msg.className = "msg err";
                msg.textContent = "Nieprawidłowy kod admina.";
                return;
            }
            
            identityUnlocked = !identityUnlocked;
            document.getElementById("f_id").disabled = !identityUnlocked;
            document.getElementById("f_login").disabled = !identityUnlocked;
            
            msg.className = "msg ok";
            msg.textContent = identityUnlocked ? "Edycja ID/Login odblokowana." : "Edycja ID/Login zablokowana.";
            document.getElementById("boss_code").value = "";
        }

        function loadMedicalHistory() {
            const hosp = readLS("hosp_v545", []);
            let record = hosp.find(r => r.patientLinkId === me.id);
            
            // Jeśli nie znaleziono po ID, szukaj po nazwisku
            if (!record) {
                record = hosp.find(r => String(r.name || "").trim().toLowerCase() === String(me.name || "").trim().toLowerCase());
            }
            
            // Jeśli nadal nie ma rekordu, stwórz go automatycznie
            if (!record) {
                record = createDefaultHospRecord(me);
                hosp.push(record);
                writeLS("hosp_v545", hosp);
                logSystem("patient", "RECORD_CREATED", { patientId: me.id, name: me.name });
            }
            
            const container = document.getElementById("medical_history");
            
            // Tworzenie eleganckiej karty glassmorphism
            container.innerHTML = `
                <div class="glass-card">
                    <h3>KARTA MEDYCZNA PACJENTA</h3>
                    
                    <div class="glass-row">
                        <div class="glass-field">
                            <span class="glass-label">Imię i Nazwisko</span>
                            <span class="glass-value">${esc(record.name || "Brak danych")}</span>
                        </div>
                        <div class="glass-field">
                            <span class="glass-label">Status</span>
                            <span class="glass-status ${record.status === 'Stabilny' ? 'status-stable' : 'status-critical'}">
                                ${record.status || 'Nieznany'}
                            </span>
                        </div>
                    </div>
                    
                    <div class="glass-row">
                        <div class="glass-field">
                            <span class="glass-label">Adres</span>
                            <span class="glass-value">${esc(record.adr || "Brak danych")}</span>
                        </div>
                        <div class="glass-field">
                            <span class="glass-label">Zawód</span>
                            <span class="glass-value">${esc(record.job || "Brak danych")}</span>
                        </div>
                    </div>
                    
                    <div class="glass-row">
                        <div class="glass-field">
                            <span class="glass-label">Ubezpieczenie</span>
                            <span class="glass-value">${record.ins || "Brak danych"}</span>
                        </div>
                        <div class="glass-field">
                            <span class="glass-label">Grupa Krwi</span>
                            <span class="glass-value">${record.blood || "Nieznana"}</span>
                        </div>
                    </div>
                    
                    <div class="glass-row">
                        <div class="glass-field">
                            <span class="glass-label">Alergie</span>
                            <span class="glass-value">${esc(record.alergie || "Brak")}</span>
                        </div>
                        <div class="glass-field">
                            <span class="glass-label">Triage</span>
                            <span class="glass-value">${record.triage || "Brak"}</span>
                        </div>
                    </div>
                    
                    <div class="glass-row">
                        <div class="glass-field">
                            <span class="glass-label">Powód Przyjęcia</span>
                            <span class="glass-value">${esc(record.reason || "Brak")}</span>
                        </div>
                        <div class="glass-field">
                            <span class="glass-label">Certyfikat</span>
                            <span class="glass-value">${record.cert || "BRAK"}</span>
                        </div>
                    </div>
                    
                    ${record.history && record.history.length > 0 ? `
                        <div class="glass-history">
                            <h3 style="color: var(--accent); margin: 0 0 12px 0; font-size: 16px;">HISTORIA MEDYCZNA</h3>
                            ${record.history.map(item => `
                                <div class="glass-history-item">
                                    <div class="glass-history-date">
                                        ${new Date(item.ts).toLocaleString('pl-PL')}
                                    </div>
                                    <div>${esc(item.note || "Brak opisu")}</div>
                                </div>
                            `).join('')}
                        </div>
                    ` : `
                        <div class="glass-history">
                            <h3 style="color: var(--accent); margin: 0 0 12px 0; font-size: 16px;">HISTORIA MEDYCZNA</h3>
                            <div style="color: var(--muted); font-size: 12px; text-align: center; padding: 20px;">
                                Brak historii medycznej
                            </div>
                        </div>
                    `}
                </div>
            `;
        }

        function addAppointment() {
            const type = document.getElementById("ap_type").value;
            const date = document.getElementById("ap_date").value;
            const note = document.getElementById("ap_note").value.trim();
            const msg = document.getElementById("ap_msg");
            
            if (!date) {
                msg.className = "msg err";
                msg.textContent = "Wybierz datę.";
                return;
            }
            
            const appointments = readLS("appointments", []);
            const appointment = {
                id: uid("AP"),
                patientId: me.id,
                patientName: me.name,
                type,
                date: new Date(date).getTime(),
                note,
                status: "Zaplanowany",
                createdAt: Date.now()
            };
            
            appointments.push(appointment);
            writeLS("appointments", appointments);
            logSystem("patient", "APPOINTMENT_CREATE", { appointmentId: appointment.id, type });
            
            msg.className = "msg ok";
            msg.textContent = "Termin zapisany.";
            document.getElementById("ap_date").value = "";
            document.getElementById("ap_note").value = "";
            loadAppointments();
        }

        function loadAppointments() {
            const appointments = readLS("appointments", []);
            const myApps = appointments.filter(a => a.patientId === me.id).sort((a, b) => b.date - a.date);
            const container = document.getElementById("appointments_list");
            
            if (myApps.length === 0) {
                container.innerHTML = "<div class='muted'>Brak zapisanych terminów.</div>";
                return;
            }
            
            container.innerHTML = myApps.map(app => `
                <div class="history-item">
                    <strong>${app.type}</strong><br>
                    ${new Date(app.date).toLocaleString()}<br>
                    Status: ${app.status}<br>
                    ${app.note ? `Notatka: ${esc(app.note)}` : ""}
                </div>
            `).join("");
        }

        function loadDoctors() {
            const staff = readLS("hospital_staff", []);
            const select = document.getElementById("consult_doctor");
            select.innerHTML = "<option value=''>Wybierz lekarza...</option>";
            
            staff.forEach(doctor => {
                select.innerHTML += `<option value='${doctor.id}'>${doctor.name} - ${doctor.specialization}</option>`;
            });
            
            select.addEventListener("change", loadConsultation);
        }

        function loadConsultation() {
            const doctorId = document.getElementById("consult_doctor").value;
            const meta = document.getElementById("consult_meta");
            const chatBox = document.getElementById("chat_box");
            
            if (!doctorId) {
                meta.innerHTML = "";
                chatBox.innerHTML = "<div class='muted'>Wybierz lekarza.</div>";
                return;
            }
            
            const staff = readLS("hospital_staff", []);
            const doctor = staff.find(d => d.id === doctorId);
            
            if (doctor) {
                meta.innerHTML = `${doctor.name} - ${doctor.specialization} - ${doctor.rank}`;
            }
            
            loadChat();
        }

        function loadChat() {
            const doctorId = document.getElementById("consult_doctor").value;
            const chatBox = document.getElementById("chat_box");
            
            if (!doctorId) return;
            
            const consultations = readLS("consultations", []);
            const consultation = consultations.find(c => 
                (c.patientId === me.id && c.doctorId === doctorId) ||
                (c.patientId === doctorId && c.doctorId === me.id)
            );
            
            if (!consultation || !consultation.messages) {
                chatBox.innerHTML = "<div class='muted'>Brak wiadomości.</div>";
                return;
            }
            
            chatBox.innerHTML = consultation.messages.map(msg => `
                <div class="chat-line ${msg.sender === me.id ? 'me' : 'other'}">
                    <strong>${msg.sender === me.id ? 'Ty' : 'Lekarz'}:</strong> ${esc(msg.text)}
                </div>
            `).join("");
            
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function sendMessage() {
            const doctorId = document.getElementById("consult_doctor").value;
            const text = document.getElementById("chat_text").value.trim();
            
            if (!doctorId || !text) return;
            
            const consultations = readLS("consultations", []);
            let consultation = consultations.find(c => 
                (c.patientId === me.id && c.doctorId === doctorId) ||
                (c.patientId === doctorId && c.doctorId === me.id)
            );
            
            if (!consultation) {
                consultation = {
                    id: uid("CONS"),
                    patientId: me.id,
                    doctorId,
                    createdAt: Date.now(),
                    messages: []
                };
                consultations.push(consultation);
            }
            
            consultation.messages.push({
                sender: me.id,
                text,
                ts: Date.now()
            });
            
            writeLS("consultations", consultations);
            logSystem("patient", "MESSAGE_SEND", { consultationId: consultation.id, doctorId });
            
            document.getElementById("chat_text").value = "";
            loadChat();
        }

        function refreshChat() {
            loadChat();
        }

        function logoutPatient() {
            writeLS("current_patient_session", null);
            logSystem("patient", "LOGOUT", { patientId: me.id });
            location.href = "hospital_system.html";
        }

        // Sprawdź sesję przy ładowaniu
        const session = readLS("current_patient_session", null);
        if (session && session.patientId) {
            const patients = readLS("registered_patients", []);
            me = patients.find(p => p.id === session.patientId);
            if (me) {
                showPortal();
            }
        }
    </script>
</body>
</html>
