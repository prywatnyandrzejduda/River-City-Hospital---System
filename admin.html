<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN PANEL - Hospital System</title>
    <style>
        :root { --accent: #ff4757; --bg: #0b0c0d; --card: #1c1f22; }
        body { 
            background: var(--bg); 
            color: #e0e0e0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden;
        }
        
        /* Ekran logowania */
        #login-screen { 
            background: var(--card); 
            padding: 40px; 
            border-radius: 15px; 
            border: 2px solid var(--accent); 
            text-align: center; 
            box-shadow: 0 0 20px rgba(255, 71, 87, 0.2); 
            z-index: 999;
        }
        input { padding: 12px; width: 200px; background: #000; border: 1px solid #444; color: white; border-radius: 5px; margin-bottom: 10px; text-align: center; outline: none; }
        button { padding: 12px 25px; background: var(--accent); color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        button:hover { opacity: 0.8; }
        
        /* Panel po zalogowaniu */
        #admin-content { display: none; width: 100vw; height: 100vh; flex-direction: row; }
        .sidebar { width: 320px; background: #141619; border-right: 2px solid #333; padding: 20px; display: flex; flex-direction: column; }
        .main-view { flex: 1; padding: 30px; overflow-y: auto; background: #0b0c0d; }
        
        #lista_pacjentow { flex-grow: 1; overflow-y: auto; margin-top: 20px; }
        .p-item { 
            padding: 15px; 
            background: rgba(255,255,255,0.05); 
            margin-bottom: 8px; 
            border-radius: 5px; 
            cursor: pointer; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            transition: 0.2s;
        }
        .p-item:hover { background: rgba(255,255,255,0.1); }
        
        .history-item { 
            background: #1c1f23; 
            padding: 20px; 
            border-left: 4px solid var(--accent); 
            margin-bottom: 15px; 
            position: relative; 
            border-radius: 4px;
        }
        .btn-red { background: #ff4757; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 10px; }
        .btn-del-entry { position: absolute; top: 10px; right: 10px; background: #c0392b; color: white; border: none; padding: 4px 8px; border-radius: 3px; cursor: pointer; font-size: 10px; }
    </style>
</head>
<body>

<div id="login-screen">
    <h2 style="color: var(--accent); margin-top: 0;">AUTORYZACJA</h2>
    <p style="font-size: 14px; color: #888;">Wymagane uprawnienia Dyrektora</p>
    <input type="password" id="pass_input" placeholder="HASŁO">
    <br>
    <button onclick="checkPass()">Zaloguj do bazy</button>
    <p id="error" style="color: #ff4757; font-size: 12px; margin-top: 10px; font-weight: bold;"></p>
</div>

<div id="admin-content">
    <div class="sidebar">
        <h2 style="color: var(--accent); letter-spacing: 1px;">ADMIN PANEL</h2>
        <div style="font-size: 10px; color: #666; margin-bottom: 20px;">ZALOGOWANO JAKO DYREKTOR</div>
        <button style="background: #333;" onclick="location.reload()">ODŚWIEŻ DANE</button>
        <div id="lista_pacjentow"></div>
    </div>
    <div class="main-view">
        <h1 id="selected_name" style="color: #444;">Wybierz pacjenta z listy...</h1>
        <div id="historia_kontener"></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
    // 1. LOGOWANIE
    function checkPass() {
        const p = document.getElementById('pass_input').value;
        const correct = "Dyrektor2024"; // Zmień hasło tutaj jeśli chcesz

        if(p === correct) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('admin-content').style.display = 'flex';
            startSystem();
        } else {
            document.getElementById('error').innerText = "BŁĘDNE HASŁO!";
        }
    }

    // Pozwala zalogować się klikając Enter
    document.getElementById('pass_input').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') checkPass();
    });

    // 2. FIREBASE I LOGIKA
    let pacjenci = [];
    let aktyw = -1;

    function startSystem() {
        const config = {
            apiKey: "AIzaSyC5MioZo7CMVGopaZANfglS12Gy_TMPzEw",
            authDomain: "baza-danych-cd445.firebaseapp.com",
            databaseURL: "https://baza-danych-cd445-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "baza-danych-cd445",
            storageBucket: "baza-danych-cd445.firebasestorage.app",
            messagingSenderId: "234044597162",
            appId: "1:234044597162:web:f46e383b858a363aea01d3"
        };

        if (!firebase.apps.length) firebase.initializeApp(config);
        const db = firebase.database();

        db.ref('pacjenci').on('value', (snap) => {
            const d = snap.val();
            pacjenci = d ? (Array.isArray(d) ? d : Object.values(d)) : [];
            renderujListe();
            if(aktyw !== -1) pokazHistorie();
        });
    }

    function renderujListe() {
        const kontener = document.getElementById('lista_pacjentow');
        kontener.innerHTML = "";
        pacjenci.forEach((p, i) => {
            if(!p) return;
            const div = document.createElement('div');
            div.className = 'p-item';
            div.innerHTML = `<span>${p.name}</span> <button class="btn-red" onclick="usunPacjenta(${i})">USUŃ</button>`;
            div.onclick = (e) => {
                if(e.target.tagName !== 'BUTTON') {
                    aktyw = i;
                    pokazHistorie();
                }
            };
            kontener.appendChild(div);
        });
    }

    function pokazHistorie() {
        const p = pacjenci[aktyw];
        if(!p) return;
        document.getElementById('selected_name').innerText = p.name;
        document.getElementById('selected_name').style.color = "white";
        const hDiv = document.getElementById('historia_kontener');
        hDiv.innerHTML = "<h3>HISTORIA WPISÓW:</h3>";

        if(!p.history) return hDiv.innerHTML += "Brak wpisów.";

        p.history.forEach((h, idx) => {
            const item = document.createElement('div');
            item.className = 'history-item';
            item.innerHTML = `
                <button class="btn-del-entry" onclick="usunWpis(${idx})">USUŃ WPIS</button>
                <small>${h.time} | ${h.rank}</small>
                <p style="white-space:pre-wrap; margin:10px 0;">${h.txt}</p>
                <b>Autor: ${h.doc}</b>
            `;
            hDiv.appendChild(item);
        });
    }

    function usunPacjenta(idx) {
        if(confirm("UWAGA: Usunąć całkowicie pacjenta " + pacjenci[idx].name + "?")) {
            pacjenci.splice(idx, 1);
            firebase.database().ref('pacjenci').set(pacjenci);
            aktyw = -1;
            document.getElementById('historia_kontener').innerHTML = "";
            document.getElementById('selected_name').innerText = "Wybierz pacjenta...";
        }
    }

    function usunWpis(idx) {
        if(confirm("Usunąć ten wpis z historii?")) {
            pacjenci[aktyw].history.splice(idx, 1);
            firebase.database().ref('pacjenci').set(pacjenci);
        }
    }
</script>

</body>
</html>
